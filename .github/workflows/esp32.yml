#
# ESP32-C3 node firmware CI: build sonde-node for ESP32-C3 (RISC-V) and run a
# Wokwi boot test that asserts the Rust application actually starts on UART.

name: ESP32-C3 Node Firmware CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'crates/sonde-node/**'
      - 'crates/sonde-protocol/**'
      - 'crates/sonde-bpf/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/esp32.yml'
  workflow_call:

concurrency:
  group: esp32-c3-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  esp32c3-node-build-and-smoke:
    name: Build ESP32-C3 node firmware and Wokwi boot test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    container:
      image: ghcr.io/alan-jowett/sonde-esp-dev:latest

    env:
      HAS_WOKWI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ------------------------------------------------------------------ #
      # Build cache
      # ------------------------------------------------------------------ #

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: ". -> target"
          key: esp32c3-riscv-${{ hashFiles('crates/sonde-node/sdkconfig.defaults', '.github/docker/Dockerfile.esp-dev') }}

      # ------------------------------------------------------------------ #
      # Build
      # ------------------------------------------------------------------ #

      - name: Build node firmware (ESP32-C3, firmware profile)
        # Source IDF export.sh first to put IDF host tools on PATH — this is
        # what makes `riscv32-esp-elf-gcc` (the RISC-V linker) visible to
        # Cargo/rustc.  Then source export-esp.sh from espup to overlay the
        # Espressif LLVM/Clang and set LIBCLANG_PATH/CLANG_PATH for bindgen.
        # Use `+esp` to select the Rust toolchain installed by espup (not
        # the default stable).  -Zbuild-std is required because the esp
        # toolchain does not ship pre-compiled std for riscv32imc-esp-espidf.
        #
        # ESP_IDF_SDKCONFIG_DEFAULTS tells esp-idf-sys where to find our
        # sdkconfig.defaults. Without this, the build silently falls back to
        # ESP-IDF defaults. We also delete any cached sdkconfig and CMake
        # cache so a stale rust-cache restore cannot override our settings.
        env:
          ESP_IDF_SDKCONFIG_DEFAULTS: crates/sonde-node/sdkconfig.defaults
          ESP_IDF_COMPONENT_MANAGER: "off"
          SONDE_GIT_COMMIT: ${{ github.sha }}
        run: |
          . "$IDF_PATH/export.sh"
          . /opt/esp/export-esp.sh
          find target -name sdkconfig -path "*/esp-idf-sys-*/out/sdkconfig" -delete 2>/dev/null || true
          find target -name CMakeCache.txt -path "*/esp-idf-sys-*/out/build/CMakeCache.txt" -delete 2>/dev/null || true
          cargo +esp build \
            -p sonde-node \
            --bin node \
            --features esp \
            --profile firmware \
            --target riscv32imc-esp-espidf \
            -Zbuild-std=std,panic_abort

      - name: Verify sdkconfig.defaults applied
        # Catch silent sdkconfig regression — the esp-idf-sys build script
        # can silently fall back to ESP-IDF defaults if the sdkconfig.defaults
        # file is not found. Assert our configured stack size is present.
        run: |
          SDKCONFIG=$(find target/riscv32imc-esp-espidf/firmware/build -name sdkconfig -path "*/esp-idf-sys-*/out/sdkconfig" -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')
          if [ -z "$SDKCONFIG" ]; then
            echo "ERROR: generated sdkconfig not found" >&2
            exit 1
          fi
          echo "Generated sdkconfig: $SDKCONFIG"
          grep -q 'CONFIG_ESP_MAIN_TASK_STACK_SIZE=16384' "$SDKCONFIG" \
            || { echo "ERROR: CONFIG_ESP_MAIN_TASK_STACK_SIZE=16384 not found in sdkconfig — sdkconfig.defaults may not have been applied" >&2; exit 1; }
          grep -q 'CONFIG_FREERTOS_HZ=1000' "$SDKCONFIG" \
            || { echo "ERROR: CONFIG_FREERTOS_HZ=1000 not found in sdkconfig" >&2; exit 1; }
          echo "sdkconfig.defaults verified ✓"

      # ------------------------------------------------------------------ #
      # Flash-image assembly
      # ------------------------------------------------------------------ #

      - name: Create merged flash image
        run: |
          . "$IDF_PATH/export.sh"
          TARGET_DIR="target/riscv32imc-esp-espidf/firmware"

          # Locate bootloader and partition table produced by embuild.
          # Use newest match to avoid stale cached artefacts.
          BOOTLOADER=$(find "$TARGET_DIR/build" \
            -name "bootloader.bin" -path "*/bootloader/*" \
            -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')
          PARTITION_TABLE=$(find "$TARGET_DIR/build" \
            -name "partition-table.bin" \
            -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')

          if [ -z "$BOOTLOADER" ]; then
            echo "ERROR: bootloader.bin not found under $TARGET_DIR/build" >&2
            exit 1
          fi
          if [ -z "$PARTITION_TABLE" ]; then
            echo "ERROR: partition-table.bin not found under $TARGET_DIR/build" >&2
            exit 1
          fi

          echo "Bootloader:       $BOOTLOADER"
          echo "Partition table:  $PARTITION_TABLE"

          # Convert ELF → flat binary.
          esptool.py --chip esp32c3 elf2image \
            --flash_mode  dio \
            --flash_freq  40m \
            --flash_size  4MB \
            --output "$TARGET_DIR/node.bin" \
            "$TARGET_DIR/node"

          # Merge bootloader + partition table + app into a single 4MB image.
          # --fill-flash-size pads to exactly 4MB for consistent flashing.
          # On ESP32-C3 the bootloader loads at flash offset 0x0 (not 0x1000).
          esptool.py --chip esp32c3 merge_bin \
            --output flash_image.bin \
            --fill-flash-size 4MB \
            0x0     "$BOOTLOADER" \
            0x8000  "$PARTITION_TABLE" \
            0x10000 "$TARGET_DIR/node.bin"

          echo "flash_image.bin created ($(wc -c < flash_image.bin) bytes)"

      # ------------------------------------------------------------------ #
      # Wokwi boot test
      # ------------------------------------------------------------------ #

      - name: Wokwi boot test
        # Wokwi provides full ESP32-C3 peripheral emulation (including
        # systimer), so FreeRTOS ticks and app_main() actually runs.
        # This validates the Rust application starts — not just the
        # bootloader.  Replaces the former QEMU smoke test (#105, #227).
        if: ${{ env.HAS_WOKWI_TOKEN == 'true' }}
        uses: wokwi/wokwi-ci-action@8d0e92eca93c6fc7832c805bfdc0d50bacff7558 # v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: crates/sonde-node
          timeout: 15000
          expect_text: 'sonde-node booting'
          fail_text: 'panic'
          serial_log_file: wokwi-serial.log

      - name: Print Wokwi serial log
        if: ${{ env.HAS_WOKWI_TOKEN == 'true' && always() }}
        run: |
          LOG="crates/sonde-node/wokwi-serial.log"
          if [ -f "$LOG" ]; then
            echo "=== Wokwi UART output ==="
            cat "$LOG"
            echo "========================="
          fi

      - name: Skip notice (no WOKWI_CLI_TOKEN)
        if: ${{ env.HAS_WOKWI_TOKEN != 'true' }}
        run: echo "::warning::Wokwi boot test skipped — WOKWI_CLI_TOKEN secret is not set."

      # ------------------------------------------------------------------ #
      # Upload firmware artifact
      # ------------------------------------------------------------------ #

      - name: Upload node firmware
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: node-firmware
          path: flash_image.bin
          if-no-files-found: error
          retention-days: 7

