[package]
name = "sonde-pair"
version = "0.1.0"
edition = "2021"

[dependencies]
sonde-protocol = { path = "../sonde-protocol" }
ed25519-dalek = { version = "2", features = ["zeroize"] }
curve25519-dalek = { version = "4", features = ["zeroize"] }
x25519-dalek = { version = "2", features = ["zeroize", "static_secrets"] }
hkdf = "0.12"
aes-gcm = "0.10"
sha2 = "0.10"
hmac = "0.12"
getrandom = { version = "0.3", features = ["std"] }
zeroize = { version = "1", features = ["derive"] }
ciborium = "0.2"
tracing = "0.1"
thiserror = "2"

[dev-dependencies]
hex-literal = "0.4"
tokio = { version = "1", features = ["rt", "macros"] }
ed25519-dalek = { version = "2", features = ["zeroize"] }
x25519-dalek = { version = "2", features = ["zeroize", "static_secrets"] }
