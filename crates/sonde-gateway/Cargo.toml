[package]
name = "sonde-gateway"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
sonde-protocol = { path = "../sonde-protocol" }
tokio = { version = "1", features = ["full"] }
hmac = "0.12"
sha2 = "0.10"
async-trait = "0.1"
rand = "0.8"
ciborium = "0.2"
tracing = "0.1"
tonic = "0.12"
prost = "0.13"
prevail = { git = "https://github.com/elazarg/prevail-rust.git", rev = "bc5be2ea", default-features = false }
tempfile = "3"

[build-dependencies]
tonic-build = "0.14"
