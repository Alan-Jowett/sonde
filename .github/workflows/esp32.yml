#
# ESP32-C3 node firmware CI: build sonde-node for ESP32-C3 (RISC-V) and run a
# QEMU smoke test that asserts the expected boot-marker strings appear on UART.

name: ESP32-C3 Node Firmware CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  esp32c3-node-build-and-smoke:
    name: Build ESP32-C3 node firmware and QEMU smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    container:
      # Pinned ESP-IDF release image — provides IDF_PATH, Python 3, and all
      # ESP-IDF host tools including esptool.py and idf_tools.py.
      # Tag: espressif/idf:v5.3.2
      image: espressif/idf@sha256:d85ffe6db6162f16589c4c2221de1d5c40c9d9aa2331099e2fe6f5e33d1b8f09

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ------------------------------------------------------------------ #
      # Rust toolchain
      # ------------------------------------------------------------------ #

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: ". -> target"
          key: esp32c3-riscv-${{ hashFiles('crates/sonde-node/sdkconfig.defaults') }}

      # ------------------------------------------------------------------ #
      # ESP Rust toolchain (required for riscv32imc-esp-espidf target)
      # ------------------------------------------------------------------ #

      - name: Install espup
        run: cargo install espup --locked

      - name: Install ESP Rust toolchain for ESP32-C3
        # espup install (without --targets) installs the full `esp` Rust
        # toolchain (the Espressif fork of nightly) and writes ~/export-esp.sh,
        # which sets PATH, LIBCLANG_PATH, and CLANG_PATH for ESP GCC/LLVM.
        # --targets esp32c3 would only add RISC-V targets to the *stable*
        # toolchain without creating the `esp` toolchain, causing
        # `cargo +esp build` to fail with "toolchain 'esp' is not installed".
        # The full `esp` toolchain supports all ESP targets including RISC-V.
        run: espup install

      - name: Install ldproxy linker
        run: cargo install ldproxy --locked

      # ------------------------------------------------------------------ #
      # QEMU for RISC-V (ESP32-C3)
      # ------------------------------------------------------------------ #

      - name: Install QEMU for RISC-V via idf_tools.py
        # qemu-riscv32 provides experimental ESP32-C3 machine support; install
        # is idempotent so it is safe to run even if already present.
        run: |
          "$IDF_PATH/tools/idf_tools.py" install qemu-riscv32

      # ------------------------------------------------------------------ #
      # Build
      # ------------------------------------------------------------------ #

      - name: Build node firmware (ESP32-C3, firmware profile)
        # Source export-esp.sh to add ESP GCC/LLVM to PATH and set
        # LIBCLANG_PATH/CLANG_PATH for bindgen.  Use `+esp` to select the
        # Rust toolchain installed by espup (not the default stable).
        # -Zbuild-std is required because the esp toolchain does not ship
        # pre-compiled std for the riscv32imc-esp-espidf target.
        run: |
          . "$HOME/export-esp.sh"
          cargo +esp build \
            -p sonde-node \
            --bin node \
            --features esp \
            --profile firmware \
            --target riscv32imc-esp-espidf \
            -Zbuild-std=std,panic_abort

      # ------------------------------------------------------------------ #
      # Flash-image assembly
      # ------------------------------------------------------------------ #

      - name: Create merged flash image
        run: |
          . "$IDF_PATH/export.sh"
          TARGET_DIR="target/riscv32imc-esp-espidf/firmware"

          # Locate bootloader and partition table produced by embuild.
          # Use newest match to avoid stale cached artefacts.
          BOOTLOADER=$(find "$TARGET_DIR/build" \
            -name "bootloader.bin" -path "*/bootloader/*" \
            -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')
          PARTITION_TABLE=$(find "$TARGET_DIR/build" \
            -name "partition-table.bin" \
            -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')

          if [ -z "$BOOTLOADER" ]; then
            echo "ERROR: bootloader.bin not found under $TARGET_DIR/build" >&2
            exit 1
          fi
          if [ -z "$PARTITION_TABLE" ]; then
            echo "ERROR: partition-table.bin not found under $TARGET_DIR/build" >&2
            exit 1
          fi

          echo "Bootloader:       $BOOTLOADER"
          echo "Partition table:  $PARTITION_TABLE"

          # Convert ELF → flat binary.
          esptool.py --chip esp32c3 elf2image \
            --flash_mode  dio \
            --flash_freq  40m \
            --flash_size  4MB \
            --output "$TARGET_DIR/node.bin" \
            "$TARGET_DIR/node"

          # Merge bootloader + partition table + app into a single 4MB image.
          # --fill-flash-size pads to exactly 4MB, which QEMU requires.
          # On ESP32-C3 the bootloader loads at flash offset 0x0 (not 0x1000).
          esptool.py --chip esp32c3 merge_bin \
            --output flash_image.bin \
            --fill-flash-size 4MB \
            0x0     "$BOOTLOADER" \
            0x8000  "$PARTITION_TABLE" \
            0x10000 "$TARGET_DIR/node.bin"

          echo "flash_image.bin created ($(wc -c < flash_image.bin) bytes)"

      # ------------------------------------------------------------------ #
      # QEMU smoke test
      # ------------------------------------------------------------------ #

      - name: Run QEMU smoke test
        # Source IDF export.sh so qemu-system-riscv32 is on PATH.
        run: |
          . "$IDF_PATH/export.sh"
          QEMU_OUTPUT="/tmp/qemu_uart.txt"

          # Boot the firmware under QEMU with a hard timeout.
          # -no-reboot prevents restart loops on early failures.
          # Redirect output to file so we can inspect it after QEMU exits;
          # capture the exit code before asserting on its value.
          # Disable errexit so the non-zero timeout exit (124) doesn't
          # abort the step before we can inspect it.
          set +e
          timeout 60 qemu-system-riscv32 \
            -nographic \
            -machine esp32c3 \
            -drive file=flash_image.bin,if=mtd,format=raw \
            -no-reboot \
            > "$QEMU_OUTPUT" 2>&1
          QEMU_EXIT=$?
          set -e

          echo ""
          echo "=== QEMU UART output ==="
          cat "$QEMU_OUTPUT"
          echo "========================"

          # Exit 124 = timeout (expected — firmware is running the idle loop).
          # Exit 0   = QEMU exited cleanly (unusual but acceptable for marker check).
          # Any other non-zero = QEMU crashed or was killed unexpectedly → fail.
          if [ "$QEMU_EXIT" -ne 0 ] && [ "$QEMU_EXIT" -ne 124 ]; then
            echo "ERROR: QEMU exited with unexpected code $QEMU_EXIT" >&2
            exit 1
          fi

          # Assert that the firmware reached each expected boot-marker log line.
          PASS=true
          for marker in "sonde-node booting" "sonde-node ready"; do
            if grep -qF "$marker" "$QEMU_OUTPUT"; then
              echo "✓  Found marker: '$marker'"
            else
              echo "✗  Missing marker: '$marker'" >&2
              PASS=false
            fi
          done

          if [ "$PASS" = "false" ]; then
            echo "Smoke test FAILED — one or more expected markers were not found." >&2
            exit 1
          fi

          echo "Smoke test passed."

