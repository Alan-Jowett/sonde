# IR-2: Logical Circuit Description — Sonde Carrier Board
# Pipeline: Pass 2 — Circuit Design
# Input: IR-0.yaml, IR-1.yaml, IR-1g.yaml, IR-PB.yaml
# Generated: 2026-04-08
#
# NOTE: This is a YAML netlist — NOT code, NOT a schematic, NOT KiCad.
# Every connection is a named net. Every value cites a source.

schema_version: "1.0.0"
project: sonde-carrier

# ===========================================================================
# Named Nets
# ===========================================================================
nets:
  - name: VBAT
    description: "Battery positive terminal (2×AA lithium, 1.8–3.6V)"
    type: power
    power_source: "IR-PB/VBAT"

  - name: VBAT_FILT
    description: "Filtered battery voltage after ferrite bead FB1"
    type: power
    power_source: "IR-PB/VBAT_FILT"

  - name: SENSOR_V
    description: "Gated sensor power rail (P-FET Q1 drain)"
    type: power
    power_source: "IR-PB/SENSOR_V"

  - name: SENSOR_EN
    description: "P-FET gate control signal (GPIO4, active LOW)"
    type: signal

  - name: SDA
    description: "I2C data line (GPIO6)"
    type: signal

  - name: SCL
    description: "I2C clock line (GPIO7)"
    type: signal

  - name: 1W_DATA
    description: "1-Wire data line (GPIO3)"
    type: signal

  - name: VBAT_SENSE
    description: "Battery voltage divider midpoint (GPIO2 ADC)"
    type: signal

  - name: GND
    description: "Ground reference"
    type: power

# ===========================================================================
# Functional Groups
# ===========================================================================
functional_groups:

  - name: power-input
    description: "Battery connection, filtering, and main decoupling"
    components: [J3, FB1, C1]
    signal_flow: "in → board"
    requirements: [REQ-HW-0206, REQ-HW-0300, REQ-HW-0301, REQ-HW-0302]

  - name: power-gating
    description: "P-FET load switch for SENSOR_V rail"
    components: [Q1, R4, C2]
    signal_flow: "VBAT → SENSOR_V (switched)"
    requirements: [REQ-HW-0400, REQ-HW-0402, REQ-HW-0403, REQ-HW-0405, REQ-HW-0406]

  - name: i2c-interface
    description: "I2C bus connector and pull-up resistors"
    components: [J1, R1, R2]
    signal_flow: "bidirectional (MCU ↔ sensors)"
    requirements: [REQ-HW-0200, REQ-HW-0201, REQ-HW-0202, REQ-HW-0500]

  - name: onewire-interface
    description: "1-Wire bus connector and pull-up resistor"
    components: [J2, R3]
    signal_flow: "bidirectional (MCU ↔ sensors)"
    requirements: [REQ-HW-0203, REQ-HW-0204, REQ-HW-0205, REQ-HW-0501]

  - name: battery-sensing
    description: "Battery voltage divider and ADC filter"
    components: [R5, R6, C3]
    signal_flow: "SENSOR_V → ADC (input)"
    requirements: [REQ-HW-0600, REQ-HW-0601, REQ-HW-0602, REQ-HW-0603]

  - name: mcu-socket
    description: "XIAO ESP32-C3 module header sockets"
    components: [J6, J7]
    signal_flow: "bidirectional (board ↔ module)"
    requirements: [REQ-HW-0100, REQ-HW-0101, REQ-HW-0102, REQ-HW-0103]

# ===========================================================================
# Complete Netlist
# ===========================================================================
# Every component pin is listed with its net connection.
# NC = not connected (explicitly marked).

netlist:

  # --- J3: Battery Connector (power-input) ---
  - ref_des: J3
    component: "S2B-PH-K-S (JST PH 2-pin RA)"
    group: power-input
    pins:
      - pin: 1
        name: "VCC (+)"
        net: VBAT
        label: KNOWN
        citation: "REQ-HW-0206, IR-1 J3 pin assignment"
      - pin: 2
        name: "GND (−)"
        net: GND
        label: KNOWN
        citation: "REQ-HW-0206"

  # --- FB1: Ferrite Bead (power-input) ---
  - ref_des: FB1
    component: "BLM15AG121SN1D (120Ω@100MHz, 0402)"
    group: power-input
    pins:
      - pin: 1
        name: "1"
        net: VBAT
        label: KNOWN
        citation: "REQ-HW-0301 — series ferrite bead on battery input"
      - pin: 2
        name: "2"
        net: VBAT_FILT
        label: KNOWN
        citation: "REQ-HW-0301"
    value: "120Ω @ 100MHz"
    value_rationale: >
      Dampens battery insertion transients (lead inductance ringing).
      120Ω impedance at 100MHz attenuates high-frequency noise while
      presenting only 0.190Ω DC resistance (negligible voltage drop).
    value_citation: "REQ-HW-0301, Murata BLM15AG121SN1D datasheet"
    value_label: KNOWN

  # --- C1: VBAT Decoupling (power-input) ---
  - ref_des: C1
    component: "CL21A106KAYNNNE (10µF X5R 25V, 0805)"
    group: power-input
    pins:
      - pin: 1
        name: "+"
        net: VBAT_FILT
        label: KNOWN
        citation: "REQ-HW-0302 — placed near XIAO 3V3 pin"
      - pin: 2
        name: "−"
        net: GND
        label: KNOWN
        citation: "REQ-HW-0302"
    value: "10µF"
    value_rationale: >
      Absorbs inrush energy during battery insertion. Provides charge
      reservoir during brief TX bursts (~335mA peak). 10µF chosen over
      1µF (original schematic note) per REQ-HW-0302 for better inrush
      handling and TX burst support. 0805 package needed for 10µF in
      X5R dielectric at this voltage.
    value_citation: "REQ-HW-0302"
    value_label: KNOWN
    voltage_rating_V: 25
    tolerance_pct: 10

  # --- Q1: P-FET Load Switch (power-gating) ---
  - ref_des: Q1
    component: "Si2301CDS-T1-GE3 (P-FET, SOT-23)"
    group: power-gating
    pins:
      - pin: 1
        name: "Gate"
        net: SENSOR_EN
        label: KNOWN
        citation: "REQ-HW-0402, Si2301 datasheet pin diagram"
      - pin: 2
        name: "Source"
        net: VBAT
        label: KNOWN
        citation: >
          High-side switch: source connects to supply (VBAT).
          Si2301 datasheet, standard P-FET high-side topology.
      - pin: 3
        name: "Drain"
        net: SENSOR_V
        label: KNOWN
        citation: "REQ-HW-0400 — drain is the switched output"
    design_notes: >
      P-FET high-side load switch. GPIO4 drives gate LOW to turn on
      (Vgs ≈ −VBAT, full enhancement). R4 pulls gate to VBAT when
      GPIO4 is high-Z (boot/reset/deep-sleep), keeping MOSFET OFF
      and SENSOR_V unpowered.

  # --- R4: Gate Pull-Up (power-gating) ---
  - ref_des: R4
    component: "0402WGF1003TCE (100kΩ 1%, 0402)"
    group: power-gating
    pins:
      - pin: 1
        name: "1"
        net: SENSOR_EN
        label: KNOWN
        citation: "REQ-HW-0403"
      - pin: 2
        name: "2"
        net: VBAT
        label: KNOWN
        citation: "REQ-HW-0403 — pull-up to VBAT"
    value: "100kΩ"
    value_rationale: >
      Ensures P-FET gate defaults to VBAT (OFF state) during boot,
      reset, and deep sleep when GPIO4 is floating/high-Z. 100kΩ
      chosen to minimize current draw when GPIO4 drives LOW
      (I = VBAT/100kΩ = 33µA). Lower values waste power; higher
      values risk slow turn-off due to gate capacitance time constant.
    value_citation: "REQ-HW-0403, standard P-FET gate pull-up design"
    value_label: KNOWN
    tolerance_pct: 1

  # --- C2: SENSOR_V Decoupling (power-gating) ---
  - ref_des: C2
    component: "CL05A105KA5NQNC (1µF X5R 25V, 0402)"
    group: power-gating
    pins:
      - pin: 1
        name: "+"
        net: SENSOR_V
        label: KNOWN
        citation: "REQ-HW-0406"
      - pin: 2
        name: "−"
        net: GND
        label: KNOWN
        citation: "REQ-HW-0406"
    value: "1µF"
    value_rationale: >
      Decouples SENSOR_V rail for sensor bus stability. Placed near
      P-FET drain to absorb switching transients when the rail is
      enabled/disabled.
    value_citation: "REQ-HW-0406"
    value_label: KNOWN
    voltage_rating_V: 25
    tolerance_pct: 10

  # --- R1: I2C SDA Pull-Up (i2c-interface) ---
  - ref_des: R1
    component: "0402WGF4701TCE (4.7kΩ 1%, 0402)"
    group: i2c-interface
    pins:
      - pin: 1
        name: "1"
        net: SDA
        label: KNOWN
        citation: "REQ-HW-0500"
      - pin: 2
        name: "2"
        net: SENSOR_V
        label: KNOWN
        citation: "REQ-HW-0500 — pull-up to gated rail"
    value: "4.7kΩ"
    value_rationale: >
      Standard I2C pull-up for standard/fast mode at 3.3V. Per NXP
      I2C specification (UM10204 §7.1), pull-up resistance range for
      standard mode at 3.3V VDD is 1.5kΩ–15kΩ. 4.7kΩ is the most
      common value, providing good balance between rise time and
      current draw. On gated SENSOR_V for zero deep-sleep leakage.
    value_citation: "NXP I2C spec UM10204 §7.1, REQ-HW-0500"
    value_label: KNOWN
    tolerance_pct: 1

  # --- R2: I2C SCL Pull-Up (i2c-interface) ---
  - ref_des: R2
    component: "0402WGF4701TCE (4.7kΩ 1%, 0402)"
    group: i2c-interface
    pins:
      - pin: 1
        name: "1"
        net: SCL
        label: KNOWN
        citation: "REQ-HW-0500"
      - pin: 2
        name: "2"
        net: SENSOR_V
        label: KNOWN
        citation: "REQ-HW-0500"
    value: "4.7kΩ"
    value_rationale: "Same as R1 — SCL pull-up. See R1 rationale."
    value_citation: "NXP I2C spec UM10204 §7.1, REQ-HW-0500"
    value_label: KNOWN
    tolerance_pct: 1

  # --- J1: Qwiic Connector (i2c-interface) ---
  - ref_des: J1
    component: "SM04B-SRSS-TB (JST SH 4-pin SMD RA)"
    group: i2c-interface
    pins:
      - pin: 1
        name: "GND"
        net: GND
        label: KNOWN
        citation: "REQ-HW-0201 — SparkFun Qwiic pinout"
      - pin: 2
        name: "VCC"
        net: SENSOR_V
        label: KNOWN
        citation: "REQ-HW-0201"
      - pin: 3
        name: "SDA"
        net: SDA
        label: KNOWN
        citation: "REQ-HW-0201"
      - pin: 4
        name: "SCL"
        net: SCL
        label: KNOWN
        citation: "REQ-HW-0201"

  # --- R3: 1-Wire Pull-Up (onewire-interface) ---
  - ref_des: R3
    component: "0402WGF4701TCE (4.7kΩ 1%, 0402)"
    group: onewire-interface
    pins:
      - pin: 1
        name: "1"
        net: 1W_DATA
        label: KNOWN
        citation: "REQ-HW-0501"
      - pin: 2
        name: "2"
        net: SENSOR_V
        label: KNOWN
        citation: "REQ-HW-0501 — pull-up to gated rail"
    value: "4.7kΩ"
    value_rationale: >
      Standard 1-Wire pull-up value per Dallas/Maxim 1-Wire
      specification. 4.7kΩ provides sufficient pull-up current for
      parasitic power mode while maintaining compatibility with
      standard mode sensors like DS18B20.
    value_citation: "Maxim 1-Wire design guide AN148, REQ-HW-0501"
    value_label: KNOWN
    tolerance_pct: 1

  # --- J2: 1-Wire Connector (onewire-interface) ---
  - ref_des: J2
    component: "S3B-XH-A (JST XH 3-pin THT RA)"
    group: onewire-interface
    pins:
      - pin: 1
        name: "GND"
        net: GND
        label: KNOWN
        citation: "REQ-HW-0204"
      - pin: 2
        name: "DATA"
        net: 1W_DATA
        label: KNOWN
        citation: "REQ-HW-0204"
      - pin: 3
        name: "VCC"
        net: SENSOR_V
        label: KNOWN
        citation: "REQ-HW-0204"

  # --- R5: Battery Divider Upper (battery-sensing) ---
  - ref_des: R5
    component: "0402WGF1003TCE (100kΩ 1%, 0402)"
    group: battery-sensing
    pins:
      - pin: 1
        name: "1"
        net: SENSOR_V
        label: KNOWN
        citation: "REQ-HW-0600, REQ-HW-0602"
      - pin: 2
        name: "2"
        net: VBAT_SENSE
        label: KNOWN
        citation: "REQ-HW-0602"
    value: "100kΩ"
    value_rationale: >
      Upper leg of 1:2 voltage divider. 100kΩ/100kΩ gives
      Vout = Vin/2. At VBAT = 3.6V, ADC sees 1.8V (within ESP32-C3
      ADC range 0–2.5V). High resistance minimizes current draw
      (16.5µA when active). On gated SENSOR_V for zero deep-sleep
      leakage. 1% tolerance for ≤2% voltage reading accuracy.
    value_citation: "REQ-HW-0602"
    value_label: KNOWN
    tolerance_pct: 1

  # --- R6: Battery Divider Lower (battery-sensing) ---
  - ref_des: R6
    component: "0402WGF1003TCE (100kΩ 1%, 0402)"
    group: battery-sensing
    pins:
      - pin: 1
        name: "1"
        net: VBAT_SENSE
        label: KNOWN
        citation: "REQ-HW-0602"
      - pin: 2
        name: "2"
        net: GND
        label: KNOWN
        citation: "REQ-HW-0602"
    value: "100kΩ"
    value_rationale: "Lower leg of divider to GND. See R5 rationale."
    value_citation: "REQ-HW-0602"
    value_label: KNOWN
    tolerance_pct: 1

  # --- C3: ADC Filter Cap (battery-sensing) ---
  - ref_des: C3
    component: "CC0402KRX7R7BB104 (100nF X7R 16V, 0402)"
    group: battery-sensing
    pins:
      - pin: 1
        name: "+"
        net: VBAT_SENSE
        label: KNOWN
        citation: "REQ-HW-0603"
      - pin: 2
        name: "−"
        net: GND
        label: KNOWN
        citation: "REQ-HW-0603"
    value: "100nF"
    value_rationale: >
      Filter capacitor for ADC sampling accuracy. With 50kΩ Thévenin
      source impedance (100kΩ || 100kΩ), the RC time constant is
      50kΩ × 100nF = 5ms. At 7× time constants (35ms), the voltage
      settles to within 0.1% of the true divider output. Firmware
      must wait ≥50ms after enabling SENSOR_V before reading ADC.
    value_citation: "REQ-HW-0603, RC time constant calculation"
    value_label: KNOWN
    voltage_rating_V: 16
    tolerance_pct: 10

  # --- J6: XIAO Left Header (mcu-socket) ---
  - ref_des: J6
    component: "1×7 Female Header 2.54mm"
    group: mcu-socket
    pins:
      - pin: 1
        name: "D0/A0 (GPIO2)"
        net: VBAT_SENSE
        label: KNOWN
        citation: "REQ-HW-0601 — ADC input"
      - pin: 2
        name: "D1/A1 (GPIO3)"
        net: 1W_DATA
        label: KNOWN
        citation: "REQ-HW-0205 — 1-Wire data"
      - pin: 3
        name: "D2/A2 (GPIO4)"
        net: SENSOR_EN
        label: KNOWN
        citation: "REQ-HW-0402 — P-FET gate control"
      - pin: 4
        name: "D3/A3 (GPIO5)"
        net: NC
        status: "spare — not connected on carrier board"
        label: KNOWN
        citation: "IR-0 GPIO pin map — GPIO5 spare"
      - pin: 5
        name: "D4/SDA (GPIO6)"
        net: SDA
        label: KNOWN
        citation: "REQ-HW-0202"
      - pin: 6
        name: "D5/SCL (GPIO7)"
        net: SCL
        label: KNOWN
        citation: "REQ-HW-0202"
      - pin: 7
        name: "3V3"
        net: VBAT_FILT
        label: KNOWN
        citation: "REQ-HW-0102 — power input to XIAO via 3V3 pin"

  # --- J7: XIAO Right Header (mcu-socket) ---
  - ref_des: J7
    component: "1×7 Female Header 2.54mm"
    group: mcu-socket
    pins:
      - pin: 1
        name: "D6 (GPIO21)"
        net: NC
        status: "spare — not connected on carrier board"
        label: KNOWN
        citation: "IR-0 GPIO pin map — GPIO21 spare"
      - pin: 2
        name: "D7 (GPIO20)"
        net: NC
        status: "spare — not connected on carrier board"
        label: KNOWN
        citation: "IR-0 GPIO pin map — GPIO20 spare"
      - pin: 3
        name: "D8 (GPIO8)"
        net: NC
        status: "spare — not connected on carrier board"
        label: KNOWN
        citation: "IR-0 GPIO pin map — GPIO8 spare"
      - pin: 4
        name: "D9 (GPIO9)"
        net: NC
        status: "spare — BOOT pin, avoid LOW at boot"
        label: KNOWN
        citation: "IR-0 GPIO pin map — GPIO9 spare"
      - pin: 5
        name: "D10 (GPIO10)"
        net: NC
        status: "spare — not connected on carrier board"
        label: KNOWN
        citation: "IR-0 GPIO pin map — GPIO10 spare"
      - pin: 6
        name: "GND"
        net: GND
        label: KNOWN
        citation: "REQ-HW-0103"
      - pin: 7
        name: "5V"
        net: NC
        status: "NOT CONNECTED — per REQ-HW-0102"
        label: KNOWN
        citation: "REQ-HW-0102 — 5V/VIN NOT connected"

