# Copyright (c) 2026 sonde contributors
#
# ESP32-C3 node firmware CI: build sonde-node for ESP32-C3 (RISC-V), run ELF
# static analysis to verify the Rust application is correctly linked, and run a
# QEMU smoke test that asserts the expected ESP-IDF boot-marker strings appear
# on UART.

name: ESP32-C3 Node Firmware CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'crates/sonde-node/**'
      - 'crates/sonde-protocol/**'
      - 'crates/sonde-bpf/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/esp32.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  esp32c3-node-build-and-smoke:
    name: Build ESP32-C3 node firmware, ELF analysis, and QEMU smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    container:
      image: ghcr.io/alan-jowett/sonde-esp-dev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ------------------------------------------------------------------ #
      # Build cache
      # ------------------------------------------------------------------ #

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: ". -> target"
          key: esp32c3-riscv-${{ hashFiles('crates/sonde-node/sdkconfig.defaults') }}

      # ------------------------------------------------------------------ #
      # Build
      # ------------------------------------------------------------------ #

      - name: Build node firmware (ESP32-C3, firmware profile)
        # Source IDF export.sh first to put IDF host tools on PATH — this is
        # what makes `riscv32-esp-elf-gcc` (the RISC-V linker) visible to
        # Cargo/rustc.  Then source export-esp.sh from espup to overlay the
        # Espressif LLVM/Clang and set LIBCLANG_PATH/CLANG_PATH for bindgen.
        # Use `+esp` to select the Rust toolchain installed by espup (not
        # the default stable).  -Zbuild-std is required because the esp
        # toolchain does not ship pre-compiled std for riscv32imc-esp-espidf.
        run: |
          . "$IDF_PATH/export.sh"
          . /opt/esp/export-esp.sh
          cargo +esp build \
            -p sonde-node \
            --bin node \
            --features esp \
            --profile firmware \
            --target riscv32imc-esp-espidf \
            -Zbuild-std=std,panic_abort

      # ------------------------------------------------------------------ #
      # ELF static analysis
      # ------------------------------------------------------------------ #

      - name: Verify ELF binary (static analysis)
        # Inspect the compiled ELF to prove the Rust application code was
        # compiled and linked correctly — independent of whether QEMU can
        # execute it.  This directly addresses the gap where the QEMU smoke
        # test only reaches the ESP-IDF bootloader (systimer is not emulated,
        # so the FreeRTOS scheduler never starts and app_main() is never
        # called). See #105.
        #
        # Checks:
        #   1. ELF machine type is RISC-V — proves the firmware was
        #      cross-compiled for the correct target (riscv32imc-esp-espidf).
        #   2. `app_main` is a defined text symbol — the C-callable entry point
        #      that ESP-IDF invokes after FreeRTOS starts; it is generated by
        #      esp-idf-svc::sys::link_patches() and dispatches into Rust main().
        #   3. The string literal "sonde-node booting" is present in the binary
        #      — directly proves that src/bin/node.rs (the Rust application
        #      entry point) was compiled and linked into the image.  A firmware
        #      that only has a valid bootloader but no Rust app would fail here.
        run: |
          . "$IDF_PATH/export.sh"
          TARGET_DIR="target/riscv32imc-esp-espidf/firmware"
          ELF="$TARGET_DIR/node"

          echo "=== ELF header ==="
          riscv32-esp-elf-readelf -h "$ELF"

          PASS=true

          # 1. Verify RISC-V machine type.
          if riscv32-esp-elf-readelf -h "$ELF" | grep -q "Machine.*RISC-V"; then
            echo "✓  ELF machine type: RISC-V"
          else
            echo "✗  ELF machine type is not RISC-V" >&2
            PASS=false
          fi

          # 2. Verify app_main is a defined text symbol.
          # app_main is the C entry point generated by esp-idf-svc that calls
          # Rust main(); its presence proves the ESP-IDF / Rust glue is linked.
          if riscv32-esp-elf-nm --defined-only "$ELF" | grep -q " app_main$"; then
            echo "✓  app_main symbol defined"
          else
            echo "✗  app_main not found as a defined symbol" >&2
            PASS=false
          fi

          # 3. Verify the "sonde-node booting" startup string is present.
          # info!("sonde-node booting") in src/bin/node.rs embeds this literal
          # in the .rodata section. Its presence proves the Rust application
          # code (not just the bootloader) was compiled and linked.
          if strings "$ELF" | grep -qF "sonde-node booting"; then
            echo "✓  'sonde-node booting' string present in binary"
          else
            echo "✗  'sonde-node booting' string not found in binary" >&2
            PASS=false
          fi

          if [ "$PASS" = "false" ]; then
            echo "ELF static analysis FAILED." >&2
            exit 1
          fi

          echo "ELF static analysis passed."

      # ------------------------------------------------------------------ #
      # Flash-image assembly
      # ------------------------------------------------------------------ #

      - name: Create merged flash image
        run: |
          . "$IDF_PATH/export.sh"
          TARGET_DIR="target/riscv32imc-esp-espidf/firmware"

          # Locate bootloader and partition table produced by embuild.
          # Use newest match to avoid stale cached artefacts.
          BOOTLOADER=$(find "$TARGET_DIR/build" \
            -name "bootloader.bin" -path "*/bootloader/*" \
            -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')
          PARTITION_TABLE=$(find "$TARGET_DIR/build" \
            -name "partition-table.bin" \
            -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')

          if [ -z "$BOOTLOADER" ]; then
            echo "ERROR: bootloader.bin not found under $TARGET_DIR/build" >&2
            exit 1
          fi
          if [ -z "$PARTITION_TABLE" ]; then
            echo "ERROR: partition-table.bin not found under $TARGET_DIR/build" >&2
            exit 1
          fi

          echo "Bootloader:       $BOOTLOADER"
          echo "Partition table:  $PARTITION_TABLE"

          # Convert ELF → flat binary.
          esptool.py --chip esp32c3 elf2image \
            --flash_mode  dio \
            --flash_freq  40m \
            --flash_size  4MB \
            --output "$TARGET_DIR/node.bin" \
            "$TARGET_DIR/node"

          # Merge bootloader + partition table + app into a single 4MB image.
          # --fill-flash-size pads to exactly 4MB, which QEMU requires.
          # On ESP32-C3 the bootloader loads at flash offset 0x0 (not 0x1000).
          esptool.py --chip esp32c3 merge_bin \
            --output flash_image.bin \
            --fill-flash-size 4MB \
            0x0     "$BOOTLOADER" \
            0x8000  "$PARTITION_TABLE" \
            0x10000 "$TARGET_DIR/node.bin"

          echo "flash_image.bin created ($(wc -c < flash_image.bin) bytes)"

      # ------------------------------------------------------------------ #
      # QEMU smoke test
      # ------------------------------------------------------------------ #

      - name: Run QEMU bootloader smoke test
        # Source IDF export.sh so qemu-system-riscv32 is on PATH.
        #
        # NOTE: This test checks for ESP-IDF bootloader markers, not Rust-level
        # markers (`sonde-node booting`). The Rust application startup is
        # validated by the preceding ELF static analysis step.
        #
        # ESP32-C3 QEMU support is experimental — the systimer peripheral used
        # for FreeRTOS tick generation is not fully emulated, so the FreeRTOS
        # scheduler never starts and `app_main()` / Rust `main()` is never
        # called. See #105.
        #
        # The ESP-IDF bootloader markers still prove the firmware was correctly:
        #   1. Cross-compiled for riscv32imc-esp-espidf
        #   2. Converted from ELF → binary → merged flash image
        #   3. Loaded and validated by the ESP-IDF 2nd-stage bootloader
        #   4. Initialized through CPU start, heap, and flash detection
        run: |
          . "$IDF_PATH/export.sh"
          QEMU_OUTPUT="/tmp/qemu_uart.txt"

          # Boot the firmware under QEMU with a hard timeout.
          # -no-reboot prevents restart loops on early failures.
          # 15s is enough — ESP-IDF boot markers appear within 2s; the
          # remaining time is buffer for slow CI runners. The firmware
          # hangs after eFuse init (before FreeRTOS scheduler start) so
          # a longer timeout just wastes CI time.
          set +e
          timeout 15 qemu-system-riscv32 \
            -nographic \
            -machine esp32c3 \
            -drive file=flash_image.bin,if=mtd,format=raw \
            -no-reboot \
            > "$QEMU_OUTPUT" 2>&1
          QEMU_EXIT=$?
          set -e

          echo ""
          echo "=== QEMU UART output ==="
          cat "$QEMU_OUTPUT"
          echo "========================"

          # Exit 124 = timeout (expected — QEMU hangs after eFuse init).
          # Exit 0   = QEMU exited cleanly (unusual but acceptable).
          # Any other non-zero = QEMU crashed or was killed → fail.
          if [ "$QEMU_EXIT" -ne 0 ] && [ "$QEMU_EXIT" -ne 124 ]; then
            echo "ERROR: QEMU exited with unexpected code $QEMU_EXIT" >&2
            exit 1
          fi

          # Assert ESP-IDF boot markers that prove the firmware image is
          # valid and bootable. These are printed before the FreeRTOS
          # scheduler starts, so they work even though QEMU can't fully
          # boot ESP32-C3 firmware (see note above).
          #
          # "cpu_start: Pro cpu start user code" — CPU init reached user code
          # "app_init: Application information"  — app metadata loaded
          # "heap_init: Initializing"            — RAM layout correct
          PASS=true
          for marker in \
            "cpu_start: Pro cpu start user code" \
            "app_init: Application information" \
            "heap_init: Initializing"; do
            if grep -qF "$marker" "$QEMU_OUTPUT"; then
              echo "✓  Found marker: '$marker'"
            else
              echo "✗  Missing marker: '$marker'" >&2
              PASS=false
            fi
          done

          if [ "$PASS" = "false" ]; then
            echo "Smoke test FAILED — one or more expected markers were not found." >&2
            exit 1
          fi

          echo "Smoke test passed."

