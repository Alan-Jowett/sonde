id: dc-operating-point
name: DC operating point
description: >
  Verify the 3V3 rail is within spec when powered from a nominal 3.7 V
  LiPo battery with USB disconnected.

sources:
  VBAT: 3.7
  VUSB: 0

state: active

analysis:
  type: op

assertions:
  - net: 3V3
    measure: voltage
    operator: "approx"
    threshold: 3.3
    tolerance_pct: 5
    unit: V
    description: "3V3 rail must be 3.3 V ± 5 %"
