name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'test-programs/**'
      - '.github/workflows/ci.yml'
  workflow_call:

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check --all

  check:
    name: Check (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: ${{ matrix.profile }}

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            protobuf-compiler libudev-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Clippy
        run: cargo clippy --workspace --all-targets ${{ matrix.profile == 'release' && '--release' || '' }} -- -D warnings

      - name: Test
        run: cargo test --workspace ${{ matrix.profile == 'release' && '--release' || '' }}

      - name: Test gateway (Python handler tests)
        if: matrix.profile == 'debug'
        run: cargo test -p sonde-gateway --features python-tests

      - name: Build gateway and admin (release)
        if: matrix.profile == 'release'
        run: cargo build --release -p sonde-gateway -p sonde-admin

      - name: Upload Linux binaries
        if: matrix.profile == 'release'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gateway-linux-x86_64
          path: |
            target/release/sonde-gateway
            target/release/sonde-admin
          if-no-files-found: error
          retention-days: 7

  gateway-windows:
    name: Build gateway (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build gateway (release)
        run: cargo build --release -p sonde-gateway -p sonde-admin

      - name: Upload Windows gateway and admin binaries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gateway-windows-x86_64
          path: |
            target/release/sonde-gateway.exe
            target/release/sonde-admin.exe
          if-no-files-found: error
          retention-days: 7

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    env:
      CONFORMANCE_IMAGE: "ghcr.io/alan-jowett/bpf_conformance@sha256:547765717557e0f222de71fbf26f4bd9621c0149911aa03296024b469dd4598b"
      KNOWN_FAILURES: "mem-len"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: llvm-tools

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: coverage

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            protobuf-compiler libudev-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage
        run: |
          source <(cargo llvm-cov show-env --export-prefix)
          cargo llvm-cov clean --workspace
          cargo test --workspace
          cargo build -p sonde-bpf --bin sonde_bpf_plugin
          docker run \
            -v "${{ github.workspace }}":/sonde \
            -v "$CARGO_LLVM_COV_TARGET_DIR":"$CARGO_LLVM_COV_TARGET_DIR" \
            -e LLVM_PROFILE_FILE="$CARGO_LLVM_COV_TARGET_DIR/conformance-%p.profraw" \
            --rm "${{ env.CONFORMANCE_IMAGE }}" \
            bin/bpf_conformance_runner --test_file_directory tests \
            --plugin_path "$CARGO_LLVM_COV_TARGET_DIR/debug/sonde_bpf_plugin" \
            --exclude_regex "${{ env.KNOWN_FAILURES }}"
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --json --output-path coverage-summary.json

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info

      - name: Upload coverage reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-reports
          path: |
            lcov.info
            coverage-summary.json
          retention-days: 30
          if-no-files-found: error

  bpf-conformance:
    name: BPF conformance (RFC 9669)
    runs-on: ubuntu-latest
    env:
      CONFORMANCE_IMAGE: "ghcr.io/alan-jowett/bpf_conformance@sha256:547765717557e0f222de71fbf26f4bd9621c0149911aa03296024b469dd4598b"
      # mem-len: test assumes r2 contains memory length (non-standard register setup)
      KNOWN_FAILURES: "mem-len"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Build plugin
        run: cargo build --release -p sonde-bpf --bin sonde_bpf_plugin

      - name: Run BPF conformance tests
        run: |
          docker run -v ${{ github.workspace }}:/sonde --rm \
            "${{ env.CONFORMANCE_IMAGE }}" \
            bin/bpf_conformance_runner --test_file_directory tests \
            --plugin_path /sonde/target/release/sonde_bpf_plugin \
            --exclude_regex "${{ env.KNOWN_FAILURES }}"

  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_decode_frame
          - fuzz_node_message
          - fuzz_gateway_message
          - fuzz_program_image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # nightly
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: fuzz-${{ matrix.target }}

      - name: Create fuzz corpus directory
        run: mkdir -p crates/sonde-protocol/fuzz/corpus/${{ matrix.target }}

      - name: Restore fuzz corpus
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: crates/sonde-protocol/fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: fuzz-corpus-${{ matrix.target }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz ${{ matrix.target }}
        run: cd crates/sonde-protocol && cargo fuzz run ${{ matrix.target }} -- -max_total_time=30
