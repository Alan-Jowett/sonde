#
# Nightly release orchestrator: calls each build workflow, collects their
# artifacts, and publishes a dated GitHub pre-release so testers always have
# fresh binaries. Scheduled runs skip the build fan-out when the previous
# nightly already targets the current commit. Dev-container workflows run on
# their own schedule (05:00-05:30 UTC) so images are up-to-date before
# firmware builds start here.

name: Nightly Release

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  should_run:
    name: Check nightly commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_builds: ${{ steps.decision.outputs.run_builds }}
    steps:
      - name: Decide whether to build
        id: decision
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "schedule" ]]; then
            echo "run_builds=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! PREVIOUS_SHA="$(
            gh api "repos/${{ github.repository }}/releases?per_page=100" \
              --jq '[.[] | select(.prerelease and (.tag_name | startswith("nightly-"))) ] | sort_by(.created_at) | last | .target_commitish // ""'
          )"; then
            echo "::warning::Failed to query previous nightly release; continuing with scheduled build."
            echo "run_builds=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$PREVIOUS_SHA" ]]; then
            echo "No prior nightly release found; continuing."
            echo "run_builds=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$PREVIOUS_SHA" == "${GITHUB_SHA}" ]]; then
            echo "Latest nightly release already targets ${GITHUB_SHA}; skipping scheduled build."
            echo "run_builds=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest nightly release targets ${PREVIOUS_SHA}; current commit is ${GITHUB_SHA}."
          echo "run_builds=true" >> "$GITHUB_OUTPUT"

  # ── Build workflows (run in parallel) ──────────────────────────────
  gateway:
    name: Gateway
    needs: [should_run]
    if: needs.should_run.outputs.run_builds == 'true'
    uses: ./.github/workflows/ci.yml

  gateway-container:
    name: Gateway container
    needs: [should_run, modem-firmware]
    if: needs.should_run.outputs.run_builds == 'true'
    uses: ./.github/workflows/gateway-container.yml
    permissions:
      contents: read
      packages: write

  node-firmware:
    name: Node firmware
    needs: [should_run]
    if: needs.should_run.outputs.run_builds == 'true'
    uses: ./.github/workflows/esp32.yml

  modem-firmware:
    name: Modem firmware
    needs: [should_run]
    if: needs.should_run.outputs.run_builds == 'true'
    uses: ./.github/workflows/esp32-modem.yml

  desktop:
    name: Desktop apps
    needs: [should_run]
    if: needs.should_run.outputs.run_builds == 'true'
    uses: ./.github/workflows/tauri-desktop.yml

  android:
    name: Android APK
    needs: [should_run]
    if: needs.should_run.outputs.run_builds == 'true'
    uses: ./.github/workflows/tauri-android.yml
    secrets: inherit

  # ── Installer builds (depend on gateway binaries) ───────────────
  installer-linux:
    name: Linux installer (.deb)
    needs: [should_run, gateway]
    if: needs.should_run.outputs.run_builds == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: gateway-linux-x86_64
          path: target/release

      - name: Make binaries executable
        run: chmod +x target/release/sonde-gateway target/release/sonde-admin

      - name: Build .deb package
        run: |
          sudo apt-get update && sudo apt-get install -y fakeroot
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BASE=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version *= *"\(.*\)"/\1/p; }' Cargo.toml)
            DATE=$(date -u +%Y%m%d)
            VERSION="${BASE}+nightly.${DATE}"
          fi
          bash installer/linux/build-deb.sh --arch amd64 --version "${VERSION}"

      - name: Upload .deb
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonde-installer-linux-amd64
          path: "*.deb"
          if-no-files-found: error
          retention-days: 7

  installer-linux-arm64:
    name: Linux installer (.deb arm64)
    needs: [should_run]
    if: needs.should_run.outputs.run_builds == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: arm64-release

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            protobuf-compiler libudev-dev fakeroot dpkg

      - name: Build binaries (release)
        run: cargo build --release -p sonde-gateway -p sonde-admin

      - name: Build .deb package
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BASE=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version *= *"\(.*\)"/\1/p; }' Cargo.toml)
            DATE=$(date -u +%Y%m%d)
            VERSION="${BASE}+nightly.${DATE}"
          fi
          bash installer/linux/build-deb.sh --arch arm64 --version "${VERSION}"

      - name: Upload .deb
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonde-installer-linux-arm64
          path: "*.deb"
          if-no-files-found: error
          retention-days: 7

      - name: Upload arm64 binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gateway-linux-arm64
          path: |
            target/release/sonde-gateway
            target/release/sonde-admin
          if-no-files-found: error
          retention-days: 7

  installer-windows:
    name: Windows installer (.msi)
    needs: [should_run, gateway]
    if: needs.should_run.outputs.run_builds == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: gateway-windows-x86_64
          path: target/release

      - name: Install WiX v4
        run: |
          dotnet tool install -g wix --version 4.0.6
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Add WiX extensions
        run: |
          wix extension add WixToolset.UI.wixext/4.0.6
          wix extension add WixToolset.Util.wixext/4.0.6

      - name: Build custom action DLL
        run: dotnet build installer\windows\CustomActions\SondeCustomActions.csproj -c Release

      - name: Build MSI
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -match '^refs/tags/v(\d+\.\d+\.\d+)$') {
            $ver = $Matches[1] + ".0"
          } else {
            $base = (Select-String -Path Cargo.toml -Pattern '^\s*version\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
            $epoch = [DateTime]::new(2026, 1, 1, 0, 0, 0, [DateTimeKind]::Utc)
            $revision = [int](New-TimeSpan -Start $epoch -End (Get-Date).ToUniversalTime().Date).TotalDays
            $ver = "$base.$revision"
          }
          wix build installer\windows\sonde.wxs `
            -d Version="$ver" `
            -d GatewayBin=target\release\sonde-gateway.exe `
            -d AdminBin=target\release\sonde-admin.exe `
            -d CustomActionCaDll=installer\windows\CustomActions\bin\Release\net472\SondeCustomActions.CA.dll `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -out sonde-x86_64.msi

      - name: Upload MSI
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonde-installer-windows
          path: sonde-x86_64.msi
          if-no-files-found: error
          retention-days: 7

  # ── Publish release ────────────────────────────────────────────────
  release:
    name: Publish nightly
    needs: [should_run, gateway, gateway-container, node-firmware, modem-firmware, desktop, android, installer-linux, installer-linux-arm64, installer-windows]
    if: needs.should_run.outputs.run_builds == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create nightly pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            IS_RELEASE=true
          else
            DATE=$(date -u +%Y-%m-%d)
            TAG="nightly-${DATE}"
            IS_RELEASE=false
          fi

          # Delete previous release for this tag (idempotent re-runs)
          gh release delete "$TAG" --yes 2>/dev/null || true
          if [[ "$IS_RELEASE" != "true" ]]; then
            git push origin ":refs/tags/$TAG" 2>/dev/null || true
          fi

          # Rename artifacts to avoid basename collisions (e.g. both
          # node and modem firmware produce flash_image.bin).
          mkdir -p release-assets
          cp artifacts/gateway-linux-x86_64/sonde-gateway  release-assets/sonde-gateway
          cp artifacts/gateway-linux-x86_64/sonde-admin     release-assets/sonde-admin
          cp artifacts/gateway-linux-arm64/sonde-gateway    release-assets/sonde-gateway-arm64
          cp artifacts/gateway-linux-arm64/sonde-admin      release-assets/sonde-admin-arm64
          cp artifacts/gateway-windows-x86_64/sonde-gateway.exe release-assets/sonde-gateway.exe
          cp artifacts/gateway-windows-x86_64/sonde-admin.exe   release-assets/sonde-admin.exe
          cp artifacts/node-firmware/flash_image.bin        release-assets/node-flash_image.bin
          cp artifacts/modem-firmware/flash_image.bin       release-assets/modem-flash_image.bin
          for f in artifacts/sonde-pair-windows/*; do cp -r "$f" release-assets/; done
          for f in artifacts/sonde-pair-linux/*;   do cp -r "$f" release-assets/; done
          for f in artifacts/sonde-pair-android-debug/*; do cp -r "$f" release-assets/; done
          if [ -d artifacts/sonde-pair-android-release ]; then
            for f in artifacts/sonde-pair-android-release/*; do cp -r "$f" release-assets/; done
          fi
          for f in artifacts/sonde-installer-linux-amd64/*;  do cp -r "$f" release-assets/; done
          for f in artifacts/sonde-installer-linux-arm64/*;  do cp -r "$f" release-assets/; done
          for f in artifacts/sonde-installer-windows/*; do cp -r "$f" release-assets/; done

          # Build release notes
          cat > notes.md <<'EOF'
          ## Included artifacts

          | Component | Asset filename |
          |-----------|----------------|
          | Gateway (Linux x86_64) | `sonde-gateway` |
          | Admin CLI (Linux x86_64) | `sonde-admin` |
          | Gateway (Linux arm64) | `sonde-gateway-arm64` |
          | Admin CLI (Linux arm64) | `sonde-admin-arm64` |
          | Gateway (Windows x86_64) | `sonde-gateway.exe` |
          | Admin CLI (Windows) | `sonde-admin.exe` |
          | ESP32-C3 Node firmware | `node-flash_image.bin` |
          | ESP32-S3 Modem firmware | `modem-flash_image.bin` |
          | Desktop — Windows | `*.exe` |
          | Desktop — Linux | `*.deb` |
          | Android APK (debug) | `*-debug.apk` |
          | Android APK (release) | `*-release.apk` (when signing secrets configured) |
          | Installer — Windows | `sonde-x86_64.msi` |
          | Installer — Linux (amd64) | `sonde_*_amd64.deb` |
          | Installer — Linux (arm64) | `sonde_*_arm64.deb` |
          | Container (multi-arch) | `ghcr.io/alan-jowett/sonde-gateway` |

          ### Flashing firmware

          ```bash
          espflash write-bin -p PORT 0x0 node-flash_image.bin   # node
          espflash write-bin -p PORT 0x0 modem-flash_image.bin  # modem
          ```

          > **Note:** Use `espflash write-bin` at offset `0x0` — these are merged
          > flash images (bootloader + partition table + app). Do **not** use
          > `espflash flash` as it substitutes its own bundled bootloader.
          EOF

          # Upload all staged assets
          ASSETS=()
          while IFS= read -r -d '' f; do
            ASSETS+=("$f")
          done < <(find release-assets -type f -print0)

          RELEASE_ARGS=(
            --target "${{ github.sha }}"
            --notes-file notes.md
          )
          if [[ "$IS_RELEASE" == "true" ]]; then
            RELEASE_ARGS+=(--title "Release ${TAG}")
          else
            RELEASE_ARGS+=(--title "Nightly Build ${DATE}" --prerelease)
          fi

          gh release create "$TAG" "${RELEASE_ARGS[@]}" "${ASSETS[@]}"
