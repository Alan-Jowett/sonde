syntax = "proto3";
package sonde.admin;

service GatewayAdmin {
    rpc ListNodes(Empty) returns (ListNodesResponse);
    rpc GetNode(GetNodeRequest) returns (NodeInfo);
    rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);
    rpc RemoveNode(RemoveNodeRequest) returns (Empty);
    rpc FactoryReset(FactoryResetRequest) returns (Empty);
    rpc IngestProgram(IngestProgramRequest) returns (IngestProgramResponse);
    rpc ListPrograms(Empty) returns (ListProgramsResponse);
    rpc AssignProgram(AssignProgramRequest) returns (Empty);
    rpc RemoveProgram(RemoveProgramRequest) returns (Empty);
    rpc SetSchedule(SetScheduleRequest) returns (Empty);
    rpc QueueReboot(QueueRebootRequest) returns (Empty);
    rpc QueueEphemeral(QueueEphemeralRequest) returns (Empty);
    rpc GetNodeStatus(GetNodeStatusRequest) returns (NodeStatus);
    rpc ExportState(ExportStateRequest) returns (ExportStateResponse);
    rpc ImportState(ImportStateRequest) returns (Empty);
    // Modem management — forwarded to the modem via serial protocol.
    rpc GetModemStatus(Empty) returns (ModemStatus);
    rpc SetModemChannel(SetModemChannelRequest) returns (Empty);
    rpc ScanModemChannels(Empty) returns (ScanModemChannelsResponse);

    // BLE phone pairing — Phase 1 (GW-1222).
    // OpenBlePairing is server-streaming: it opens the registration window
    // and streams BLE pairing events (passkey requests, registration results)
    // back to the CLI client until the window closes or the client disconnects.
    rpc OpenBlePairing(OpenBlePairingRequest) returns (stream BlePairingEvent);
    rpc CloseBlePairing(Empty) returns (Empty);
    rpc ConfirmBlePairing(ConfirmBlePairingRequest) returns (Empty);

    // Phone PSK management.
    rpc ListPhones(Empty) returns (ListPhonesResponse);
    rpc RevokePhone(RevokePhoneRequest) returns (Empty);

    // Handler management (GW-1402).
    rpc AddHandler(AddHandlerRequest) returns (Empty);
    rpc RemoveHandler(RemoveHandlerRequest) returns (Empty);
    rpc ListHandlers(Empty) returns (ListHandlersResponse);
}

message Empty {}

// `node_id` is the admin-assigned opaque identifier used to correlate a node
// across sessions, handler API calls, and admin operations.
message NodeInfo {
    string node_id = 1;
    uint32 key_hint = 2;
    bytes assigned_program_hash = 3;
    bytes current_program_hash = 4;
    optional uint32 last_battery_mv = 5;
    optional uint32 last_firmware_abi_version = 6;
    optional uint64 last_seen_ms = 7;
    optional uint32 schedule_interval_s = 8;
}

message ListNodesResponse { repeated NodeInfo nodes = 1; }
message GetNodeRequest { string node_id = 1; }
message RegisterNodeRequest { string node_id = 1; uint32 key_hint = 2; bytes psk = 3; }
message RegisterNodeResponse { string node_id = 1; }
message RemoveNodeRequest { string node_id = 1; }
message FactoryResetRequest { string node_id = 1; }

message ProgramInfo {
    bytes hash = 1;
    uint32 size = 2;
    VerificationProfile verification_profile = 3;
    optional uint32 abi_version = 4;
    optional string source_filename = 5;
}

enum VerificationProfile {
    VERIFICATION_PROFILE_UNSPECIFIED = 0;
    VERIFICATION_PROFILE_RESIDENT = 1;
    VERIFICATION_PROFILE_EPHEMERAL = 2;
}

// `image_data` accepts either a raw ELF binary or, in debug / development
// builds only, a pre-encoded CBOR program image. ELF inputs are
// auto-detected via the \x7fELF magic and verified with Prevail before
// conversion to CBOR (GW-0400, GW-0401). In release / production builds,
// non-ELF inputs are rejected. When enabled (e.g., debug builds),
// pre-encoded CBOR inputs are accepted as-is, WITHOUT Prevail verification,
// and are intended strictly for test-only / development use (for example,
// injecting known-good images); do not rely on the CBOR path for untrusted
// programs or in production deployments.
message IngestProgramRequest { bytes image_data = 1; VerificationProfile verification_profile = 2; optional uint32 abi_version = 3; optional string source_filename = 4; }
message IngestProgramResponse { bytes program_hash = 1; uint32 program_size = 2; }
message ListProgramsResponse { repeated ProgramInfo programs = 1; }
message AssignProgramRequest { string node_id = 1; bytes program_hash = 2; }
message RemoveProgramRequest { bytes program_hash = 1; }

message SetScheduleRequest { string node_id = 1; uint32 interval_s = 2; }
message QueueRebootRequest { string node_id = 1; }
message QueueEphemeralRequest { string node_id = 1; bytes program_hash = 2; }
message GetNodeStatusRequest { string node_id = 1; }
message NodeStatus {
    string node_id = 1;
    bytes current_program_hash = 2;
    optional uint32 battery_mv = 3;
    optional uint32 firmware_abi_version = 4;
    optional uint64 last_seen_ms = 5;
    bool has_active_session = 6;
}
message ExportStateRequest { string passphrase = 1; }
message ExportStateResponse { bytes data = 1; }
message ImportStateRequest { bytes data = 1; string passphrase = 2; }

// Modem management messages.
message ModemStatus {
    uint32 channel = 1;
    uint32 tx_count = 2;
    uint32 rx_count = 3;
    uint32 tx_fail_count = 4;
    uint32 uptime_s = 5;
}
message SetModemChannelRequest { uint32 channel = 1; }
message ChannelSurveyEntry {
    uint32 channel = 1;
    uint32 ap_count = 2;
    int32 strongest_rssi = 3;
}
message ScanModemChannelsResponse { repeated ChannelSurveyEntry entries = 1; }

// BLE phone pairing messages (GW-1222).
message OpenBlePairingRequest {
    // Registration window duration in seconds (0 = use default 120s).
    uint32 duration_s = 1;
}

message BlePairingEvent {
    oneof event {
        // Registration window opened.
        BlePairingWindowOpened window_opened = 1;
        // Numeric Comparison passkey — operator must confirm.
        BlePairingPasskey passkey = 2;
        // Phone connected via BLE.
        BlePairingPhoneConnected phone_connected = 3;
        // Phone disconnected from BLE.
        BlePairingPhoneDisconnected phone_disconnected = 4;
        // Phone registered successfully.
        BlePairingPhoneRegistered phone_registered = 5;
        // Registration window closed (auto-timeout or explicit).
        BlePairingWindowClosed window_closed = 6;
    }
}

message BlePairingWindowOpened { uint32 duration_s = 1; }
message BlePairingPasskey { uint32 passkey = 1; }
message BlePairingPhoneConnected { bytes peer_addr = 1; uint32 mtu = 2; }
message BlePairingPhoneDisconnected { bytes peer_addr = 1; }
message BlePairingPhoneRegistered { string label = 1; uint32 phone_key_hint = 2; }
message BlePairingWindowClosed {}

message ConfirmBlePairingRequest { bool accept = 1; }

// Phone PSK management.
message PhoneInfo {
    uint32 phone_id = 1;
    uint32 phone_key_hint = 2;
    string label = 3;
    uint64 issued_at_ms = 4;
    string status = 5; // "active" or "revoked"
}
message ListPhonesResponse { repeated PhoneInfo phones = 1; }
message RevokePhoneRequest { uint32 phone_id = 1; }

// Handler management messages (GW-1402).
message AddHandlerRequest {
    string program_hash = 1;
    string command = 2;
    repeated string args = 3;
    string working_dir = 4;
    optional uint64 reply_timeout_ms = 5;
}
message RemoveHandlerRequest { string program_hash = 1; }
message HandlerInfo {
    string program_hash = 1;
    string command = 2;
    repeated string args = 3;
    string working_dir = 4;
    optional uint64 reply_timeout_ms = 5;
}
message ListHandlersResponse { repeated HandlerInfo handlers = 1; }
