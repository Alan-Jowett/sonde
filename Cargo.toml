[workspace]
resolver = "2"
members = [
    "crates/sonde-protocol",
    "crates/sonde-gateway",
    "crates/sonde-modem",
    "crates/sonde-node",
    "crates/sonde-admin",
]
default-members = [
    "crates/sonde-protocol",
    "crates/sonde-gateway",
    "crates/sonde-admin",
]

# Aggressive size optimization for firmware builds.
[profile.release]
opt-level = "s"       # Optimize for size
lto = true            # Link-time optimization
codegen-units = 1     # Single codegen unit for better LTO
strip = "symbols"     # Strip debug symbols from binary
