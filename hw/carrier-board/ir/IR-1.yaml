# IR-1: Component Bill — Sonde Carrier Board
# Pipeline: Pass 1 — Component Selection
# Input: IR-0.yaml
# Generated: 2026-04-08

schema_version: "1.0.0"
project: sonde-carrier

# Note: The Seeed Studio XIAO ESP32-C3 module is USER-SUPPLIED and not
# part of this BOM. The carrier board interfaces with it via J6/J7 headers.

components:

  # =========================================================================
  # Active Components
  # =========================================================================

  - ref_des: Q1
    description: "P-channel MOSFET high-side load switch"
    manufacturer: "Vishay Siliconix"
    part_number: "Si2301CDS-T1-GE3"
    package: "SOT-23-3"
    generic_footprint: "SOT-23"
    electrical_specs:
      type: "P-channel MOSFET"
      vds_max_V: -20
      vgs_max_V: 8
      id_continuous_A: -3.1
      rds_on_ohm_at_vgs_neg4_5V: 0.115
      rds_on_ohm_at_vgs_neg2_5V: 0.160
      gate_threshold_vgs_V: [-0.4, -1.2]  # min, max
      operating_temp_C: [-55, 150]
    pin_assignment:
      pin_1: {name: "Gate", net: "SENSOR_EN"}
      pin_2: {name: "Source", net: "VBAT"}
      pin_3: {name: "Drain", net: "SENSOR_V"}
    satisfies: [REQ-HW-0400, REQ-HW-0402, REQ-HW-0405]
    rationale: >
      Si2301 is a ubiquitous, low-cost P-FET in SOT-23. Its low Vgs(th)
      (-0.4 to -1.2V) ensures full enhancement at VBAT as low as 2.4V.
      Sub-µA off-state leakage meets the deep-sleep current target.
      Widely stocked at JLCPCB/LCSC.
    sourcing:
      lcsc_pn: "C10487"
      unit_price_usd_qty100: 0.065
      stock_units: 325000
      lifecycle: "active"
      date_verified: "2026-04-08"
      verification_label: KNOWN

  # =========================================================================
  # Passive Components — Ferrite Bead
  # =========================================================================

  - ref_des: FB1
    description: "Ferrite bead for battery input transient damping"
    manufacturer: "Murata"
    part_number: "BLM15AG121SN1D"
    package: "0402"
    generic_footprint: "0402"
    electrical_specs:
      impedance_ohm_at_100MHz: 120
      rated_current_mA: 550
      dc_resistance_ohm: 0.190
      operating_temp_C: [-55, 125]
    pin_assignment:
      pin_1: {name: "1", net: "VBAT"}
      pin_2: {name: "2", net: "VBAT_FILT"}
    satisfies: [REQ-HW-0301]
    rationale: >
      120Ω@100MHz ferrite bead dampens battery insertion ringing from lead
      inductance. 550mA rating exceeds peak ESP32-C3 TX current (~350mA).
      Replaces original BOM C76712 (possibly discontinued at LCSC) with
      equivalent Murata part at lower cost and higher stock.
    sourcing:
      lcsc_pn: "C85812"
      unit_price_usd_qty100: 0.007
      stock_units: 238800
      lifecycle: "active"
      date_verified: "2026-04-08"
      verification_label: KNOWN
    notes: >
      Original requirements spec listed C76712; this is a verified
      drop-in replacement with better availability.

