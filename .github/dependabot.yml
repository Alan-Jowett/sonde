version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps:"
    groups:
      grpc:
        patterns:
          - "tonic"
          - "tonic-build"
          - "prost"
          - "prost-build"
          - "prost-types"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci:"
