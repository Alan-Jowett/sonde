#
# Wokwi simulation config for the ESP32-S3 modem firmware.
# See wokwi/README.md for usage.

[wokwi]
version = 1
# Use the app-only binary (not the merged flash image).
# Wokwi provides its own bootloader when loading a .bin file.
# The merged flash_image.bin is a raw flash dump that Wokwi cannot parse.
firmware = '../../firmware-modem/modem.bin'
elf = '../../firmware-modem/modem.elf'
