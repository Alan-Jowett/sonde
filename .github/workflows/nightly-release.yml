#
# Nightly release orchestrator: calls each build workflow, collects their
# artifacts, and publishes a dated GitHub pre-release so testers always have
# fresh binaries.  Dev-container workflows run on their own schedule (05:00-
# 05:30 UTC) so images are up-to-date before firmware builds start here.

name: Nightly Release

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  # ── Build workflows (run in parallel) ──────────────────────────────
  gateway:
    name: Gateway
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  node-firmware:
    name: Node firmware
    uses: ./.github/workflows/esp32.yml
    secrets: inherit

  modem-firmware:
    name: Modem firmware
    uses: ./.github/workflows/esp32-modem.yml
    secrets: inherit

  desktop:
    name: Desktop apps
    uses: ./.github/workflows/tauri-desktop.yml
    secrets: inherit

  android:
    name: Android APK
    uses: ./.github/workflows/tauri-android.yml
    secrets: inherit

  # ── Publish release ────────────────────────────────────────────────
  release:
    name: Publish nightly
    needs: [gateway, node-firmware, modem-firmware, desktop, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: artifacts

      - name: Create nightly pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          TAG="nightly-${DATE}"

          # Delete previous release for today (re-runs)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Build release notes
          cat > notes.md <<'EOF'
          ## Included artifacts

          | Component | Artifact |
          |-----------|----------|
          | Gateway (Linux x86_64) | `gateway-linux-x86_64/sonde-gateway` |
          | ESP32-C3 Node firmware | `node-firmware/flash_image.bin` |
          | ESP32-S3 Modem firmware | `modem-firmware/flash_image.bin` |
          | Desktop — Windows | `sonde-pair-windows/*.exe` |
          | Desktop — Linux | `sonde-pair-linux/*.deb` |
          | Android APK | `sonde-pair-android/*.apk` |

          ### Flashing firmware

          ```bash
          espflash write-bin -p PORT 0x0 node-firmware/flash_image.bin   # node
          espflash write-bin -p PORT 0x0 modem-firmware/flash_image.bin  # modem
          ```

          > **Note:** Use `espflash write-bin` at offset `0x0` — these are merged
          > flash images (bootloader + partition table + app). Do **not** use
          > `espflash flash` as it substitutes its own bundled bootloader.
          EOF

          # Collect every file under artifacts/ as release assets
          ASSETS=()
          while IFS= read -r -d '' f; do
            ASSETS+=("$f")
          done < <(find artifacts -type f -print0)

          gh release create "$TAG" \
            --title "Nightly Build ${DATE}" \
            --prerelease \
            --target "${{ github.sha }}" \
            --notes-file notes.md \
            "${ASSETS[@]}"
