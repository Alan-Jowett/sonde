# IR-3: Physical Placement Constraints — Sonde Carrier Board
# Pipeline: Pass 3 — Physical Placement (Post-Binding, Interactive)
# Input: IR-0.yaml, IR-1e.yaml, IR-2.yaml, IR-PB.yaml
# Backend: KiCad 8
# Generated: 2026-04-08

schema_version: "1.0.0"
project: sonde-carrier
backend: "KiCad 8"

# ===========================================================================
# Board Outline
# ===========================================================================
board:
  shape: rectangle
  width_mm: 25.0
  height_mm: 35.0
  area_mm2: 875.0
  layers: 2
  stackup:
    layer_1: "F.Cu (front copper)"
    substrate: "FR4 1.6mm"
    layer_2: "B.Cu (back copper)"
  copper_weight_oz: 1
  surface_finish: "HASL (lead-free)"
  mounting_holes: none  # REQ-HW-0702
  origin: "bottom-left corner (0,0)"

# ===========================================================================
# Edge Definitions
# ===========================================================================
edges:
  top:
    y: 35.0
    role: "USB-C access edge"
    description: >
      XIAO USB-C port extends beyond or is flush with this edge.
      No other connectors on this edge per REQ-HW-0707.
  bottom:
    y: 0.0
    role: "Antenna edge"
    description: >
      XIAO u.FL antenna connector faces this edge. Clearance zone
      required for antenna cable routing. No connectors per REQ-HW-0707.
  left:
    x: 0.0
    role: "Connector edge (J1 Qwiic + J3 Battery)"
    connectors: [J1, J3]
  right:
    x: 25.0
    role: "Connector edge (J2 1-Wire)"
    connectors: [J2]

# ===========================================================================
# Connector Placement
# ===========================================================================
# CORRECTED 2026-04-09: positions validated against actual KiCad footprint
# courtyard_bounds (asymmetric, relative to pad-1 origin).
#
# Courtyard bounds from KiCad 8.0.9 footprint library:
#   J1 (JST_SH_SM04B): (-3.90, -3.28) to (3.90, 3.28) — symmetric
#   J2 (JST_XH_S3B):   (-2.95, -2.80) to (7.95, 9.70) — housing +Y
#   J3 (JST_PH_S2B):   (-2.45, -1.85) to (4.45, 6.75) — housing +Y
#   J6 (PinSocket_1x07):(-1.80, -1.80) to (1.75, 17.00) — pads +Y
#   J7 (PinSocket_1x07): same as J6
#
# Rotation plan:
#   Left edge connectors: 90° → +Y becomes -X (housing faces left/outward)
#   Right edge connectors: 270° → +Y becomes +X (housing faces right/outward)
#   Pin headers: 0° — default orientation has pads extending +Y (upward)
#
connector_placement:

  - ref_des: J6
    description: "XIAO left header socket (1×7, 2.54mm)"
    position:
      x_mm: 3.75   # (25 - 17.5) / 2 = 3.75 from left edge
      y_mm: 9.0    # pin 1 (D0) at y=9; pin 7 (3V3) at y=9+15.24=24.24
    orientation: "vertical, pin 1 at bottom (D0), no rotation"
    courtyard_mm: {width: 3.55, height: 18.80}
    courtyard_bounds: {min_x: -1.80, min_y: -1.80, max_x: 1.75, max_y: 17.00}
    mounting: THT
    notes: >
      Left header of XIAO socket. Pin 1 at y=9.0, pin 7 at y=24.24.
      17.5mm center-to-center spacing to J7.
      Rotated courtyard in board coords: (1.95, 7.20) to (5.50, 26.00).

  - ref_des: J7
    description: "XIAO right header socket (1×7, 2.54mm)"
    position:
      x_mm: 21.25  # 3.75 + 17.5 = 21.25 from left edge
      y_mm: 9.0
    orientation: "vertical, pin 1 at bottom (D6), no rotation"
    courtyard_mm: {width: 3.55, height: 18.80}
    courtyard_bounds: {min_x: -1.80, min_y: -1.80, max_x: 1.75, max_y: 17.00}
    mounting: THT
    notes: >
      Right header of XIAO socket. Mirrored with J6.
      Rotated courtyard in board coords: (19.45, 7.20) to (23.00, 26.00).

  - ref_des: J1
    description: "Qwiic I2C connector (JST SH 4-pin SMD)"
    edge: left
    position:
      x_mm: 0.0   # flush with left edge
      y_mm: 28.0  # upper-left, above J6 pin 7 (24.24) with clearance
    orientation: "housing facing left (outward), rotated 90°"
    courtyard_mm: {width: 7.80, height: 6.56}
    courtyard_bounds: {min_x: -3.90, min_y: -3.28, max_x: 3.90, max_y: 3.28}
    mounting: SMD
    notes: >
      At 90° rotation, courtyard rotates to (-3.28, -3.90) to (3.28, 3.90).
      Board coords: (-3.28, 24.10) to (3.28, 31.90). Housing extends
      left (off-board). Clears J6 pin 7 at y=24.24 by ~0.14mm minimum —
      acceptable for SMD connector.

  - ref_des: J3
    description: "Battery connector (JST PH 2-pin THT RA)"
    edge: left
    position:
      x_mm: 0.0   # flush with left edge
      y_mm: 6.0   # lower-left, below J6 pin 1 (9.0) with clearance
    orientation: "housing facing left (outward), rotated 90°"
    courtyard_mm: {width: 6.90, height: 8.60}
    courtyard_bounds: {min_x: -2.45, min_y: -1.85, max_x: 4.45, max_y: 6.75}
    mounting: THT
    notes: >
      At 90° rotation, courtyard rotates to (-6.75, -2.45) to (1.85, 4.45).
      Board coords: (-6.75, 1.55) to (1.85, 10.45). Housing extends far
      left (off-board). On-board pads within x=0 to 1.85.
      Clears J6 courtyard bottom (y=7.20) — gap ≈ 3.25mm.

  - ref_des: J2
    description: "1-Wire connector (JST XH 3-pin THT RA)"
    edge: right
    position:
      x_mm: 25.0  # flush with right edge
      y_mm: 28.0  # upper-right, above J7 pin 7 (24.24)
    orientation: "housing facing right (outward), rotated 270°"
    courtyard_mm: {width: 10.90, height: 12.50}
    courtyard_bounds: {min_x: -2.95, min_y: -2.80, max_x: 7.95, max_y: 9.70}
    mounting: THT
    notes: >
      At 270° rotation, courtyard rotates to (-9.70, -7.95) to (2.80, 2.95).
      Board coords: (15.30, 20.05) to (27.80, 30.95). Housing extends
      right (off-board). On-board extent: x=15.30 to 25.0.
      Clears J7 courtyard top (y=26.00) — gap ≈ 5.95mm from J7 top to
      J2 bottom (20.05). No overlap.

# ===========================================================================
# Component Grouping Zones
# ===========================================================================
component_zones:

  - group: power-input
    components: [J3, FB1, C1]
    zone:
      description: "Lower-left area, near battery connector"
      anchor: {x_mm: 4.0, y_mm: 3.0}
      extent_mm: {width: 6.0, height: 5.0}
    proximity_constraint_mm: 3.0
    notes: >
      FB1 and C1 placed below J6 and near J3 pads.
      Zone clears J6 courtyard bottom (y=7.20) and J3 rotated
      courtyard on-board extent (x up to 1.85).

  - group: power-gating
    components: [Q1, R4, C2]
    zone:
      description: "Center-left area, between pin headers"
      anchor: {x_mm: 7.0, y_mm: 12.0}
      extent_mm: {width: 8.0, height: 6.0}
    proximity_constraint_mm: 3.0
    notes: >
      Q1/R4/C2 placed in the open area between J6 and J7 pin headers.
      Zone clears J6 courtyard (x up to 5.50) and J7 courtyard
      (x from 19.45). Available width: 5.50 to 19.45 = 13.95mm.

  - group: i2c-interface
    components: [J1, R1, R2]
    zone:
      description: "Upper-left area, near Qwiic connector"
      anchor: {x_mm: 5.0, y_mm: 26.0}
      extent_mm: {width: 8.0, height: 6.0}
    proximity_constraint_mm: 3.0
    notes: >
      R1, R2 pull-ups placed near J1 (at y=28) and J6 pins 5/6
      (SDA/SCL at y≈21-22). Zone above J6 pin 7 (y=24.24).

  - group: onewire-interface
    components: [J2, R3]
    zone:
      description: "Upper-right area, near 1-Wire connector"
      anchor: {x_mm: 14.0, y_mm: 27.0}
      extent_mm: {width: 5.0, height: 6.0}
    proximity_constraint_mm: 3.0
    notes: >
      R3 pull-up placed between J7 and J2, above the pin header area.
      Zone clears J7 courtyard top (y=26.00) and J2 on-board extent
      (x from 15.30). R3 at x≈14 is just left of J2's reach.

  - group: battery-sensing
    components: [R5, R6, C3]
    zone:
      description: "Center area, between pin headers"
      anchor: {x_mm: 10.0, y_mm: 8.0}
      extent_mm: {width: 6.0, height: 5.0}
    proximity_constraint_mm: 3.0
    notes: >
      Voltage divider and ADC filter in the open center between J6/J7.
      Near J6 pin 1 (GPIO2 ADC at y=9.0) for short analog trace.
      Zone fully between J6 (x=5.50) and J7 (x=19.45).

# ===========================================================================
# Keep-Out Zones
# ===========================================================================
keepout_zones:

  - name: "antenna-clearance"
    description: "Clearance for XIAO u.FL antenna connector and cable"
    boundary:
      type: rectangle
      x_mm: 8.0
      y_mm: 0.0
      width_mm: 9.0
      height_mm: 5.0
    restriction: "No copper pour, no components, no traces on F.Cu"
    layer: "F.Cu"
    rationale: >
      REQ-HW-0705: clearance for u.FL connector at antenna end of XIAO.
      The u.FL connector is centered on the XIAO module. Cable routes
      downward/sideways from the connector. Keep area clear of copper
      to avoid detuning.
    requirement: REQ-HW-0705

# ===========================================================================
# Routing Constraints
# ===========================================================================
routing_constraints:

  power_traces:
    - net: VBAT
      min_width_mm: 0.5
      rationale: >
        Peak current 349mA. At 1oz copper, 0.5mm trace carries ~1A
        per IPC-2221. 0.5mm provides adequate margin.
      ir_pb_reference: "IR-PB/operating_modes/Active — Peak TX + Sensors"
    - net: VBAT_FILT
      min_width_mm: 0.5
      rationale: "Same current as VBAT (minus negligible ferrite bead drop)."
    - net: SENSOR_V
      min_width_mm: 0.3
      rationale: >
        Max sensor rail current ~14mA. 0.3mm is more than sufficient
        but provides margin for bus expansion.
    - net: GND
      type: "copper pour"
      layer: "B.Cu"
      rationale: >
        Ground plane on back copper layer for low-impedance return path,
        EMI reduction, and thermal spreading. Use vias to connect front
        GND pads to back plane.

  signal_traces:
    - nets: [SDA, SCL]
      width_mm: 0.25
      max_length_mm: 20
      notes: >
        I2C signals. Keep traces short (<20mm) and parallel where possible.
        No differential pair requirements. Standard mode max bus
        capacitance 400pF; fast mode 200pF. Short traces ensure margin.
    - net: 1W_DATA
      width_mm: 0.25
      max_length_mm: 30
      notes: "1-Wire signal. Route from J6 pin 2 across to J2. No impedance requirement."
    - net: VBAT_SENSE
      width_mm: 0.15
      max_length_mm: 10
      notes: >
        Analog signal — keep short to minimize noise pickup. Route
        directly from voltage divider midpoint to J6 pin 1 (GPIO2 ADC).
        Guard with GND traces if possible.
    - net: SENSOR_EN
      width_mm: 0.25
      max_length_mm: 15
      notes: "Digital control signal. GPIO4 to Q1 gate via R4."

  via_constraints:
    diameter_mm: 0.6
    drill_mm: 0.3
    notes: "Standard JLCPCB via size (0.3mm drill, 0.6mm annular ring)"

# ===========================================================================
# Feasibility Check (Definitive — IR-1e Courtyard)
# ===========================================================================
feasibility:
  total_courtyard_area_mm2: 280    # effective on-board (IR-1e adjusted)
  board_area_mm2: 875
  utilization_pct: 32.0
  warning_threshold_pct: 70
  blocking_threshold_pct: 90
  area_status: "PASS — 32% utilization, well within 70% warning threshold"
  pairwise_overlap_check:
    status: "PASS — no courtyard overlaps detected"
    connector_pairs_checked:
      - pair: [J1, J3]
        clearance_mm: 11.65
        status: "PASS"
      - pair: [J1, J6]
        clearance_mm: 0.14
        status: "PASS (tight but acceptable for SMD)"
      - pair: [J2, J7]
        clearance_mm: 5.95
        status: "PASS"
      - pair: [J3, J6]
        clearance_mm: 3.25
        status: "PASS"
      - pair: [J6, J7]
        clearance_mm: 13.95
        status: "PASS"
  notes: >
    Corrected from previous version which had 7 courtyard overlaps.
    Pin headers J6/J7 moved from y=8.11 to y=9.0 (0° rotation, pads
    extending upward). Edge connectors J1/J2 moved to y=28.0 (above
    pin header range). J3 moved to y=6.0 (below pin header range).
    All zone anchors verified to clear connector courtyards.

# ===========================================================================
# Silkscreen Plan
# ===========================================================================
silkscreen:
  labels:
    - text: "sonde"
      location: "top center of board, above XIAO module"
      layer: "F.SilkS"
      requirement: REQ-HW-0704
    - text: "J1 I2C"
      location: "adjacent to J1"
      requirement: REQ-HW-0704
    - text: "J2 1W"
      location: "adjacent to J2"
      requirement: REQ-HW-0704
    - text: "J3 BATT"
      location: "adjacent to J3"
      requirement: REQ-HW-0704
    - text: "+ −"
      location: "at J3 pin 1 and pin 2"
      requirement: REQ-HW-0704
    - text: "J6"
      location: "adjacent to J6 header"
      requirement: REQ-HW-0704
    - text: "J7"
      location: "adjacent to J7 header"
      requirement: REQ-HW-0704
    - text: "USB ↑"
      location: "near top edge"
      requirement: REQ-HW-0706
    - text: "ANT"
      location: "near bottom edge antenna area"
      requirement: REQ-HW-0705
