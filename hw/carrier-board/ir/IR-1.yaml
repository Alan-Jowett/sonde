      power_rating_W: 0.0625
      voltage_rating_V: 50
      operating_temp_C: [-55, 155]
    pin_assignment:
      pin_1: {name: "1", net: "SENSOR_EN"}
      pin_2: {name: "2", net: "VBAT"}
    satisfies: [REQ-HW-0403]
    rationale: >
      100kΩ pull-up from gate to VBAT ensures P-FET defaults OFF during
      boot/reset/deep-sleep. High value draws zero current when gate is
