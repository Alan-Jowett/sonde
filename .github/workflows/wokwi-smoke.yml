# Copyright (c) 2026 sonde contributors
#
# Wokwi firmware smoke test — validates that ESP32 firmware boots
# successfully in Wokwi's full-chip simulator (BLE, WiFi, peripherals).
#
# Requires the WOKWI_CLI_TOKEN repository secret.
# Get a token from https://wokwi.com/dashboard/ci

name: Wokwi Firmware Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'crates/sonde-node/**'
      - 'crates/sonde-modem/**'
      - 'crates/sonde-protocol/**'
      - 'wokwi/**'
      - '.github/workflows/wokwi-smoke.yml'
  workflow_dispatch:

# Cancel superseded runs on the same PR / branch.
concurrency:
  group: wokwi-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  # ── ESP32-C3 Node ──────────────────────────────────────────────
  node-smoke:
    name: ESP32-C3 Node (Wokwi)
    runs-on: ubuntu-latest
    env:
      WOKWI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Download the latest node firmware built by ESP32-C3 Node Firmware CI.
      # The artifact contains flash_image.bin (merged), node (ELF), and
      # node.bin (app binary).  Wokwi needs the app binary + ELF, not the
      # merged flash dump.
      - name: Download node firmware artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::group::Download node-firmware artifact"
          # Prefer artifacts from the current branch; fall back to main.
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          RUN_ID=$(gh run list \
            --branch "$BRANCH" \
            -w 'ESP32-C3 Node Firmware CI' \
            --status success \
            --json databaseId \
            -q '.[0].databaseId // empty' 2>/dev/null || true)

          if [ -z "$RUN_ID" ]; then
            echo "No artifact on branch $BRANCH — trying main"
            RUN_ID=$(gh run list \
              --branch main \
              -w 'ESP32-C3 Node Firmware CI' \
              --status success \
              --json databaseId \
              -q '.[0].databaseId // empty')
          fi

          echo "Using run $RUN_ID"
          gh run download "$RUN_ID" --name node-firmware --dir firmware/
          echo "Downloaded files:"
          find firmware/ -type f -exec ls -lh {} \;
          echo "::endgroup::"

      # Copy the app binary and ELF to where wokwi.toml expects them.
      # The artifact preserves the deep target/.../ directory structure;
      # wokwi.toml references ../../firmware/node.bin (short path).
      - name: Prepare node firmware for Wokwi
        run: |
          cp firmware/target/riscv32imc-esp-espidf/firmware/node.bin firmware/node.bin
          cp firmware/target/riscv32imc-esp-espidf/firmware/node firmware/node.elf
          echo "Prepared firmware files:"
          ls -lh firmware/node.bin firmware/node.elf

      - name: Wokwi — boot ESP32-C3 node
        if: ${{ env.WOKWI_TOKEN != '' }}
        uses: wokwi/wokwi-ci-action@2806875412c8a2e0552eb609492c5890a888e085 # v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: wokwi/node
          timeout: 60000
          expect_text: 'Calling app_main()'
          fail_text: 'panic'
          serial_log_file: node-serial.log

      - name: Upload node serial log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wokwi-node-serial-log
          path: wokwi/node/node-serial.log
          retention-days: 7

  # ── ESP32-S3 Modem ─────────────────────────────────────────────
  modem-smoke:
    name: ESP32-S3 Modem (Wokwi)
    runs-on: ubuntu-latest
    env:
      WOKWI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download modem firmware artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::group::Download modem-firmware artifact"
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          RUN_ID=$(gh run list \
            --branch "$BRANCH" \
            -w 'ESP32-S3 Modem Firmware CI' \
            --status success \
            --json databaseId \
            -q '.[0].databaseId // empty' 2>/dev/null || true)

          if [ -z "$RUN_ID" ]; then
            echo "No artifact on branch $BRANCH — trying main"
            RUN_ID=$(gh run list \
              --branch main \
              -w 'ESP32-S3 Modem Firmware CI' \
              --status success \
              --json databaseId \
              -q '.[0].databaseId // empty')
          fi

          echo "Using run $RUN_ID"
          gh run download "$RUN_ID" --name modem-firmware --dir firmware-modem/
          echo "Downloaded files:"
          find firmware-modem/ -type f -exec ls -lh {} \;
          echo "::endgroup::"

      # Copy app binary and ELF to where wokwi.toml expects them.
      # If individual binaries aren't in the artifact (old CI run), skip.
      - name: Prepare modem firmware for Wokwi
        id: modem-prep
        run: |
          if [ -f "firmware-modem/target/xtensa-esp32s3-espidf/firmware/modem.bin" ]; then
            cp firmware-modem/target/xtensa-esp32s3-espidf/firmware/modem.bin firmware-modem/modem.bin
            cp firmware-modem/target/xtensa-esp32s3-espidf/firmware/modem firmware-modem/modem.elf
            echo "Prepared firmware files:"
            ls -lh firmware-modem/modem.bin firmware-modem/modem.elf
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Individual modem binaries not found in artifact — modem CI may need to run with updated upload step first."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wokwi — boot ESP32-S3 modem
        if: ${{ env.WOKWI_TOKEN != '' && steps.modem-prep.outputs.ready == 'true' }}
        uses: wokwi/wokwi-ci-action@2806875412c8a2e0552eb609492c5890a888e085 # v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: wokwi/modem
          timeout: 60000
          expect_text: 'Calling app_main()'
          fail_text: 'panic'
          serial_log_file: modem-serial.log

      - name: Upload modem serial log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wokwi-modem-serial-log
          path: wokwi/modem/modem-serial.log
          retention-days: 7
