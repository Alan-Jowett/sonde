# Wokwi simulation config for the ESP32-S3 modem firmware.
# See wokwi/README.md for usage.

[wokwi]
version = 1
# Use flasher_args.json to load bootloader + partition table + app at the
# correct flash offsets.  This is the documented approach for ESP-IDF apps.
# See https://docs.wokwi.com/vscode/project-config#esp-idf-support
firmware = '../../firmware-modem/flash-parts/flasher_args.json'
elf = '../../firmware-modem/modem.elf'
