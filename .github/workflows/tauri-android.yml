#
# Tauri Android APK CI: build sonde-pair-ui for Android (aarch64).
# Produces a debug APK (always) and a signed release APK (when
# signing secrets are configured). See docs/android-signing.md.

name: Tauri Android APK

on:
  push:
    branches: [main]
    paths:
      - 'crates/sonde-pair/**'
      - 'crates/sonde-pair-ui/**'
      - 'crates/sonde-protocol/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/tauri-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/sonde-pair/**'
      - 'crates/sonde-pair-ui/**'
      - 'crates/sonde-protocol/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/tauri-android.yml'
  workflow_call:

concurrency:
  group: tauri-android-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    container:
      image: ghcr.io/alan-jowett/sonde-android-dev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ------------------------------------------------------------------ #
      # Build cache
      # ------------------------------------------------------------------ #

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: ". -> target"
          key: android-aarch64-${{ hashFiles('crates/sonde-pair-ui/src-tauri/Cargo.toml', '.github/docker/Dockerfile.android-dev') }}

      # ------------------------------------------------------------------ #
      # Build
      # ------------------------------------------------------------------ #

      - name: Initialize Android project
        working-directory: crates/sonde-pair-ui
        run: |
          rm -rf src-tauri/gen/android
          cargo tauri android init

      - name: Patch Gradle for BLE Java classes
        # Copy sonde-pair Java sources into the generated Android project,
        # restore our custom AndroidManifest (with BLE permissions), and add
        # the security-crypto dependency. This must run after
        # `tauri android init` regenerates gen/android/.
        working-directory: crates/sonde-pair-ui/src-tauri/gen/android
        run: |
          # Restore custom AndroidManifest.xml with BLE permissions from persistent location.
          cp ../../../../../crates/sonde-pair-ui/android/AndroidManifest.xml app/src/main/AndroidManifest.xml

          # Copy Java source files into the standard Android source tree
          mkdir -p app/src/main/java/io/sonde/pair
          cp ../../../../../crates/sonde-pair/java/io/sonde/pair/*.java \
             app/src/main/java/io/sonde/pair/
          ls -la app/src/main/java/io/sonde/pair/

          # Add security-crypto dependency
          GRADLE="app/build.gradle.kts"
          python3 -c "
          with open('$GRADLE') as f:
              txt = f.read()
          txt = txt.replace(
              'implementation(\"androidx.appcompat:appcompat',
              'implementation(\"androidx.security:security-crypto:1.1.0-alpha06\")\n    implementation(\"androidx.appcompat:appcompat'
          )
          with open('$GRADLE', 'w') as f:
              f.write(txt)
          "
          grep 'security-crypto' "$GRADLE"

      - name: Build Android APK (debug)
        working-directory: crates/sonde-pair-ui
        run: cargo tauri android build --debug

      # Upload debug APK immediately so it's available even if the
      # optional release build fails.
      - name: Upload debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonde-pair-android-debug
          path: crates/sonde-pair-ui/src-tauri/gen/android/**/outputs/**/debug/**/*.apk
          retention-days: 7
          if-no-files-found: error

      # ------------------------------------------------------------------ #
      # Release build (conditional — requires all 4 signing secrets)
      # ------------------------------------------------------------------ #

      - name: Validate signing secrets
        id: signing
        run: |
          if [ -n "$KEYSTORE" ] && [ -n "$STORE_PASS" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASS" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release APK skipped — signing secrets not configured"
          fi
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Decode release keystore
        if: steps.signing.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE" | base64 --decode > /tmp/sonde-release.jks
          chmod 600 /tmp/sonde-release.jks

      - name: Build Android APK (release)
        if: steps.signing.outputs.available == 'true'
        working-directory: crates/sonde-pair-ui
        env:
          ORG_GRADLE_PROJECT_android.injected.signing.store.file: /tmp/sonde-release.jks
          ORG_GRADLE_PROJECT_android.injected.signing.store.password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_android.injected.signing.key.alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_android.injected.signing.key.password: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: cargo tauri android build

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/sonde-release.jks

      - name: Upload release APK
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sonde-pair-android-release
          path: crates/sonde-pair-ui/src-tauri/gen/android/**/outputs/**/release/**/*.apk
          retention-days: 7
          if-no-files-found: error
