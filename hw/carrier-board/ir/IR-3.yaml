routing_constraints:
  power_traces:
  - net: VBAT
    min_width_mm: 0.5
    rationale: 'Peak current 349mA. At 1oz copper, 0.5mm trace carries ~1A per IPC-2221.
      0.5mm provides adequate margin.

      '
    ir_pb_reference: IR-PB/operating_modes/Active â€” Peak TX + Sensors
  - net: VBAT_FILT
    min_width_mm: 0.5
    rationale: Same current as VBAT (minus negligible ferrite bead drop).
  - net: SENSOR_V
    min_width_mm: 0.3
    rationale: 'Max sensor rail current ~14mA. 0.3mm is more than sufficient but provides
      margin for bus expansion.

      '
  - net: GND
    type: copper pour
    layer: B.Cu
    rationale: 'Ground plane on back copper layer for low-impedance return path, EMI
      reduction, and thermal spreading. Use vias to connect front GND pads to back
      plane.

      '
  signal_traces:
  - nets:
    - SDA
    - SCL
    width_mm: 0.25
    max_length_mm: 20
    notes: 'I2C signals. Keep traces short (<20mm) and parallel where possible. No
      differential pair requirements. Standard mode max bus capacitance 400pF; fast
      mode 200pF. Short traces ensure margin.

      '
  - net: 1W_DATA
    width_mm: 0.25
    max_length_mm: 30
    notes: 1-Wire signal. Route from J6 pin 2 across to J2. No impedance requirement.
  - net: VBAT_SENSE
    width_mm: 0.15
    max_length_mm: 10
    notes: 'Analog signal â€” keep short to minimize noise pickup. Route directly
      from voltage divider midpoint to J6 pin 1 (GPIO2 ADC). Guard with GND traces
      if possible.

      '
  - net: SENSOR_EN
    width_mm: 0.25
    max_length_mm: 15
    notes: Digital control signal. GPIO4 to Q1 gate via R4.
  via_constraints:
    diameter_mm: 0.6
    drill_mm: 0.3
    notes: Standard JLCPCB via size (0.3mm drill, 0.6mm annular ring)
feasibility:
  total_courtyard_area_mm2: 280
  board_area_mm2: 875
  utilization_pct: 32.0
  warning_threshold_pct: 70
  blocking_threshold_pct: 90
  area_status: PASS â€” 32% utilization, well within 70% warning threshold
  pairwise_overlap_check:
    status: PASS â€” no courtyard overlaps detected
    connector_pairs_checked:
    - pair:
      - J1
      - J3
      clearance_mm: 11.65
      status: PASS
    - pair:
      - J1
      - J6
      clearance_mm: 0.14
      status: PASS (tight but acceptable for SMD)
    - pair:
      - J2
      - J7
      clearance_mm: 5.95
      status: PASS
    - pair:
      - J3
      - J6
      clearance_mm: 3.25
      status: PASS
    - pair:
      - J6
      - J7
      clearance_mm: 13.95
      status: PASS
  notes: 'Corrected from previous version which had 7 courtyard overlaps. Pin headers
    J6/J7 moved from y=8.11 to y=9.0 (0Â° rotation, pads extending upward). Edge connectors
    J1/J2 moved to y=28.0 (above pin header range). J3 moved to y=6.0 (below pin header
    range). All zone anchors verified to clear connector courtyards.

    '
