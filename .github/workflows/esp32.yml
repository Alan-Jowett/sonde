# Copyright (c) 2026 sonde contributors
#
# ESP32-C3 node firmware CI: build sonde-node for ESP32-C3 (RISC-V) in both
# the debug profile (full TRACE/DEBUG compiled in) and the firmware profile
# (DEBUG/TRACE eliminated at compile time), then run a QEMU smoke test that
# asserts the expected boot-marker strings appear on UART.

name: ESP32-C3 Node Firmware CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'crates/sonde-node/**'
      - 'crates/sonde-protocol/**'
      - 'crates/sonde-bpf/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/esp32.yml'
  workflow_call:

concurrency:
  group: esp32-c3-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  esp32c3-node-build-and-smoke:
    name: Build ESP32-C3 node firmware and QEMU smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    container:
      image: ghcr.io/alan-jowett/sonde-esp-dev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ------------------------------------------------------------------ #
      # Build cache
      # ------------------------------------------------------------------ #

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: ". -> target"
          key: esp32c3-riscv-${{ hashFiles('crates/sonde-node/sdkconfig.defaults', '.github/docker/Dockerfile.esp-dev') }}

      # ------------------------------------------------------------------ #
      # Build — debug profile (full TRACE/DEBUG compiled in)
      # ------------------------------------------------------------------ #

      - name: Build node firmware (ESP32-C3, debug profile)
        # Build without --profile firmware to verify the debug flavor compiles
        # with debug_assertions enabled, which keeps all log levels (TRACE through
        # ERROR) compiled in via the `release_max_level_info` log feature.
        env:
          ESP_IDF_SDKCONFIG_DEFAULTS: crates/sonde-node/sdkconfig.defaults
          ESP_IDF_COMPONENT_MANAGER: "off"
          SONDE_GIT_COMMIT: ${{ github.sha }}
        run: |
          . "$IDF_PATH/export.sh"
          . /opt/esp/export-esp.sh
          find target -name sdkconfig -path "*/esp-idf-sys-*/out/sdkconfig" -delete 2>/dev/null || true
          find target -name CMakeCache.txt -path "*/esp-idf-sys-*/out/build/CMakeCache.txt" -delete 2>/dev/null || true
          cargo +esp build \
            -p sonde-node \
            --bin node \
            --features esp \
            --target riscv32imc-esp-espidf \
            -Zbuild-std=std,panic_abort

      # ------------------------------------------------------------------ #
      # Build — firmware profile (DEBUG/TRACE eliminated at compile time)
      # ------------------------------------------------------------------ #

      - name: Build node firmware (ESP32-C3, firmware profile)
        # Source IDF export.sh first to put IDF host tools on PATH — this is
        # what makes `riscv32-esp-elf-gcc` (the RISC-V linker) visible to
        # Cargo/rustc.  Then source export-esp.sh from espup to overlay the
        # Espressif LLVM/Clang and set LIBCLANG_PATH/CLANG_PATH for bindgen.
        # Use `+esp` to select the Rust toolchain installed by espup (not
        # the default stable).  -Zbuild-std is required because the esp
        # toolchain does not ship pre-compiled std for riscv32imc-esp-espidf.
        #
        # ESP_IDF_SDKCONFIG_DEFAULTS tells esp-idf-sys where to find our
        # sdkconfig.defaults. Without this, the build silently falls back to
        # ESP-IDF defaults. We also delete any cached sdkconfig and CMake
        # cache so a stale rust-cache restore cannot override our settings.
        env:
          ESP_IDF_SDKCONFIG_DEFAULTS: crates/sonde-node/sdkconfig.defaults
          ESP_IDF_COMPONENT_MANAGER: "off"
          SONDE_GIT_COMMIT: ${{ github.sha }}
        run: |
          . "$IDF_PATH/export.sh"
          . /opt/esp/export-esp.sh
          find target -name sdkconfig -path "*/esp-idf-sys-*/out/sdkconfig" -delete 2>/dev/null || true
          find target -name CMakeCache.txt -path "*/esp-idf-sys-*/out/build/CMakeCache.txt" -delete 2>/dev/null || true
          cargo +esp build \
            -p sonde-node \
            --bin node \
            --features esp \
            --profile firmware \
            --target riscv32imc-esp-espidf \
            -Zbuild-std=std,panic_abort

      - name: Verify sdkconfig.defaults applied
        # Catch silent sdkconfig regression — the esp-idf-sys build script
        # can silently fall back to ESP-IDF defaults if the sdkconfig.defaults
        # file is not found. Assert our configured stack size is present.
        run: |
          SDKCONFIG=$(find target/riscv32imc-esp-espidf/firmware/build -name sdkconfig -path "*/esp-idf-sys-*/out/sdkconfig" -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')
          if [ -z "$SDKCONFIG" ]; then
            echo "ERROR: generated sdkconfig not found" >&2
            exit 1
          fi
          echo "Generated sdkconfig: $SDKCONFIG"
          grep -q 'CONFIG_ESP_MAIN_TASK_STACK_SIZE=16384' "$SDKCONFIG" \
            || { echo "ERROR: CONFIG_ESP_MAIN_TASK_STACK_SIZE=16384 not found in sdkconfig — sdkconfig.defaults may not have been applied" >&2; exit 1; }
          grep -q 'CONFIG_FREERTOS_HZ=1000' "$SDKCONFIG" \
            || { echo "ERROR: CONFIG_FREERTOS_HZ=1000 not found in sdkconfig" >&2; exit 1; }
          echo "sdkconfig.defaults verified ✓"

      # ------------------------------------------------------------------ #
      # Flash-image assembly
      # ------------------------------------------------------------------ #

      - name: Create merged flash image
        run: |
          . "$IDF_PATH/export.sh"
          TARGET_DIR="target/riscv32imc-esp-espidf/firmware"

          # Locate bootloader and partition table produced by embuild.
          # Use newest match to avoid stale cached artefacts.
          BOOTLOADER=$(find "$TARGET_DIR/build" \
            -name "bootloader.bin" -path "*/bootloader/*" \
            -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')
          PARTITION_TABLE=$(find "$TARGET_DIR/build" \
            -name "partition-table.bin" \
            -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')

          if [ -z "$BOOTLOADER" ]; then
            echo "ERROR: bootloader.bin not found under $TARGET_DIR/build" >&2
            exit 1
          fi
          if [ -z "$PARTITION_TABLE" ]; then
            echo "ERROR: partition-table.bin not found under $TARGET_DIR/build" >&2
            exit 1
          fi

          echo "Bootloader:       $BOOTLOADER"
          echo "Partition table:  $PARTITION_TABLE"

          # Convert ELF → flat binary.
          esptool.py --chip esp32c3 elf2image \
            --flash_mode  dio \
            --flash_freq  40m \
            --flash_size  4MB \
            --output "$TARGET_DIR/node.bin" \
            "$TARGET_DIR/node"

          # Merge bootloader + partition table + app into a single 4MB image.
          # --fill-flash-size pads to exactly 4MB, which QEMU requires.
          # On ESP32-C3 the bootloader loads at flash offset 0x0 (not 0x1000).
          esptool.py --chip esp32c3 merge_bin \
            --output flash_image.bin \
            --fill-flash-size 4MB \
            0x0     "$BOOTLOADER" \
            0x8000  "$PARTITION_TABLE" \
            0x10000 "$TARGET_DIR/node.bin"

          echo "flash_image.bin created ($(wc -c < flash_image.bin) bytes)"

      # ------------------------------------------------------------------ #
      # QEMU smoke test
      # ------------------------------------------------------------------ #

      - name: Run QEMU smoke test
        # Source IDF export.sh so qemu-system-riscv32 is on PATH.
        #
        # NOTE: The smoke test checks for ESP-IDF boot markers instead of
        # Rust-level markers (`sonde-node booting`). ESP32-C3 QEMU support
        # is experimental — the systimer peripheral used for FreeRTOS tick
        # generation is not fully emulated, so the FreeRTOS scheduler never
        # starts and `app_main()` / Rust `main()` is never called. See #105.
        #
        # The ESP-IDF markers still prove the firmware was correctly:
        #   1. Cross-compiled for riscv32imc-esp-espidf
        #   2. Converted from ELF → binary → merged flash image
        #   3. Loaded and validated by the ESP-IDF 2nd-stage bootloader
        #   4. Initialized through CPU start, heap, and flash detection
        run: |
          . "$IDF_PATH/export.sh"
          QEMU_OUTPUT="/tmp/qemu_uart.txt"

          # Boot the firmware under QEMU with a hard timeout.
          # -no-reboot prevents restart loops on early failures.
          # 15s is enough — ESP-IDF boot markers appear within 2s; the
          # remaining time is buffer for slow CI runners. The firmware
          # hangs after eFuse init (before FreeRTOS scheduler start) so
          # a longer timeout just wastes CI time.
          set +e
          timeout 15 qemu-system-riscv32 \
            -nographic \
            -machine esp32c3 \
            -drive file=flash_image.bin,if=mtd,format=raw \
            -no-reboot \
            > "$QEMU_OUTPUT" 2>&1
          QEMU_EXIT=$?
          set -e

          echo ""
          echo "=== QEMU UART output ==="
          cat "$QEMU_OUTPUT"
          echo "========================"

          # Exit 124 = timeout (expected — QEMU hangs after eFuse init).
          # Exit 0   = QEMU exited cleanly (unusual but acceptable).
          # Any other non-zero = QEMU crashed or was killed → fail.
          if [ "$QEMU_EXIT" -ne 0 ] && [ "$QEMU_EXIT" -ne 124 ]; then
            echo "ERROR: QEMU exited with unexpected code $QEMU_EXIT" >&2
            exit 1
          fi

          # Assert ESP-IDF boot markers that prove the firmware image is
          # valid and bootable. These are printed before the FreeRTOS
          # scheduler starts, so they work even though QEMU can't fully
          # boot ESP32-C3 firmware (see note above).
          #
          # "cpu_start: Pro cpu start user code" — CPU init reached user code
          # "app_init: Application information"  — app metadata loaded
          # "heap_init: Initializing"            — RAM layout correct
          PASS=true
          for marker in \
            "cpu_start: Pro cpu start user code" \
            "app_init: Application information" \
            "heap_init: Initializing"; do
            if grep -qF "$marker" "$QEMU_OUTPUT"; then
              echo "✓  Found marker: '$marker'"
            else
              echo "✗  Missing marker: '$marker'" >&2
              PASS=false
            fi
          done

          if [ "$PASS" = "false" ]; then
            echo "Smoke test FAILED — one or more expected markers were not found." >&2
            exit 1
          fi

          echo "Smoke test passed."

      # ------------------------------------------------------------------ #
      # Upload firmware artifact
      # ------------------------------------------------------------------ #

      - name: Upload node firmware
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: node-firmware
          path: flash_image.bin
          if-no-files-found: error
          retention-days: 7

