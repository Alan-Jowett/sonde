# ===========================================================================
# Cross-Validation
# ===========================================================================
cross_validation:

  ir_pb_power_net_references:
    - ir2_net: VBAT
      ir_pb_node: "IR-PB/VBAT"
      status: "resolves ✓"
    - ir2_net: VBAT_FILT
      ir_pb_node: "IR-PB/VBAT_FILT"
      status: "resolves ✓"
    - ir2_net: SENSOR_V
      ir_pb_node: "IR-PB/SENSOR_V"
      status: "resolves ✓"

  ir1_pin_name_compatibility:
    status: "All pin names in IR-2 match IR-1 pin assignments ✓"
    checked_components:
      - Q1: "Gate/Source/Drain match IR-1"
      - FB1: "Pin 1/2 match IR-1"
      - J1: "Pins 1-4 match IR-1 Qwiic pinout"
      - J2: "Pins 1-3 match IR-1 1-Wire pinout"
      - J3: "Pins 1-2 match IR-1 battery pinout"
      - J6: "Pins 1-7 match IR-1 XIAO left header"
      - J7: "Pins 1-7 match IR-1 XIAO right header"

  netlist_integrity:
    floating_pins: 0
    unconnected_signal_pins: 0
    power_shorts: 0
    nc_pins_explicitly_marked: 7
    all_components_connected: true
    status: "PASS ✓"

  rough_feasibility:
    board_area_mm2: 875       # 25 × 35 mm target
    total_body_area_mm2: 233  # from IR-1g
    body_utilization_pct: 26.6
    status: "PASS — body utilization well within limits"
    note: >
      This is a rough check using IR-1g body dimensions (not courtyard).
      Definitive feasibility check uses IR-1e courtyards in Pass 3.

