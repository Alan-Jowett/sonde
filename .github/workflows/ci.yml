name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, lint, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  bpf-conformance:
    name: BPF conformance (RFC 9669)
    runs-on: ubuntu-latest
    env:
      CONFORMANCE_IMAGE: "ghcr.io/alan-jowett/bpf_conformance@sha256:547765717557e0f222de71fbf26f4bd9621c0149911aa03296024b469dd4598b"
      # mem-len: test assumes r2 contains memory length (non-standard register setup)
      KNOWN_FAILURES: "mem-len"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Build plugin
        run: cargo build --release -p sonde-bpf --bin sonde_bpf_plugin

      - name: Run BPF conformance tests
        run: |
          docker run -v ${{ github.workspace }}:/sonde --rm \
            "${{ env.CONFORMANCE_IMAGE }}" \
            bin/bpf_conformance_runner --test_file_directory tests \
            --plugin_path /sonde/target/release/sonde_bpf_plugin \
            --exclude_regex "${{ env.KNOWN_FAILURES }}"

  fuzz:
    name: Fuzz test (protocol crate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # nightly
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz decode_frame
        run: cd crates/sonde-protocol && cargo fuzz run fuzz_decode_frame -- -max_total_time=30

      - name: Fuzz node_message
        run: cd crates/sonde-protocol && cargo fuzz run fuzz_node_message -- -max_total_time=30

      - name: Fuzz gateway_message
        run: cd crates/sonde-protocol && cargo fuzz run fuzz_gateway_message -- -max_total_time=30

      - name: Fuzz program_image
        run: cd crates/sonde-protocol && cargo fuzz run fuzz_program_image -- -max_total_time=30
