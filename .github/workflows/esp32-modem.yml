# ESP32-S3 modem firmware CI: build sonde-modem for ESP32-S3 (Xtensa).

name: ESP32-S3 Modem Firmware CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'crates/sonde-modem/**'
      - 'crates/sonde-protocol/**'
      - 'sdkconfig.defaults.esp32s3'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/esp32-modem.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  esp32s3-modem-build:
    name: Build ESP32-S3 modem firmware
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    container:
      # Pre-built ESP32 dev container with Rust stable, ESP Rust toolchain,
      # and ldproxy pre-installed. Published by esp-dev-container.yml.
      image: ghcr.io/alan-jowett/sonde-esp-dev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ------------------------------------------------------------------ #
      # Build cache
      # ------------------------------------------------------------------ #

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: ". -> target"
          key: esp32s3-xtensa-${{ hashFiles('crates/sonde-modem/sdkconfig.defaults', 'sdkconfig.defaults.esp32s3', '.github/docker/Dockerfile.esp-dev') }}

      # ------------------------------------------------------------------ #
      # Build
      # ------------------------------------------------------------------ #

      - name: Build modem firmware (ESP32-S3, firmware profile)
        # Source export-esp.sh to add Xtensa GCC/LLVM to PATH and set
        # LIBCLANG_PATH/CLANG_PATH for bindgen.  Use `+esp` to select the
        # Xtensa Rust toolchain installed by espup (not the default stable).
        # -Zbuild-std is required because the esp toolchain does not ship
        # pre-compiled std for the xtensa-esp32s3-espidf target.
        env:
          ESP_IDF_SDKCONFIG_DEFAULTS: crates/sonde-modem/sdkconfig.defaults;sdkconfig.defaults.esp32s3
          ESP_IDF_COMPONENT_MANAGER: "off"
        run: |
          . /opt/esp/export-esp.sh
          find target -name sdkconfig -path "*/esp-idf-sys-*/out/sdkconfig" -delete 2>/dev/null || true
          find target -name CMakeCache.txt -path "*/esp-idf-sys-*/out/build/CMakeCache.txt" -delete 2>/dev/null || true
          cargo +esp build \
            -p sonde-modem \
            --bin modem \
            --features esp \
            --profile firmware \
            --target xtensa-esp32s3-espidf \
            -Zbuild-std=std,panic_abort

      - name: Verify sdkconfig.defaults applied
        run: |
          SDKCONFIG=$(find target/xtensa-esp32s3-espidf/firmware/build -name sdkconfig -path "*/esp-idf-sys-*/out/sdkconfig" -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')
          if [ -z "$SDKCONFIG" ]; then
            echo "ERROR: generated sdkconfig not found" >&2
            exit 1
          fi
          echo "Generated sdkconfig: $SDKCONFIG"
          grep -q 'CONFIG_BT_NIMBLE_ENABLED=y' "$SDKCONFIG" \
            || { echo "ERROR: CONFIG_BT_NIMBLE_ENABLED=y not found — sdkconfig.defaults.esp32s3 may not have been applied" >&2; exit 1; }
          grep -q 'CONFIG_ESP_TASK_WDT_EN=y' "$SDKCONFIG" \
            || { echo "ERROR: CONFIG_ESP_TASK_WDT_EN=y not found — crate sdkconfig.defaults may not have been applied" >&2; exit 1; }
          grep -q 'CONFIG_PARTITION_TABLE_SINGLE_APP_LARGE=y' "$SDKCONFIG" \
            || { echo "ERROR: CONFIG_PARTITION_TABLE_SINGLE_APP_LARGE=y not found — factory partition may be too small" >&2; exit 1; }
          grep -q 'CONFIG_ESP_CONSOLE_SECONDARY_NONE=y' "$SDKCONFIG" \
            || { echo "ERROR: CONFIG_ESP_CONSOLE_SECONDARY_NONE=y not found — secondary console may leak boot logs to USB-CDC (#280)" >&2; exit 1; }
          echo "sdkconfig.defaults verified ✓"

      # ------------------------------------------------------------------ #
      # Flash-image assembly
      # ------------------------------------------------------------------ #

      - name: Create merged flash image
        run: |
          . "$IDF_PATH/export.sh"
          TARGET_DIR="target/xtensa-esp32s3-espidf/firmware"

          # Locate bootloader and partition table produced by embuild.
          # Use newest match to avoid stale cached artefacts.
          BOOTLOADER=$(find "$TARGET_DIR/build" \
            -name "bootloader.bin" -path "*/bootloader/*" \
            -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')
          PARTITION_TABLE=$(find "$TARGET_DIR/build" \
            -name "partition-table.bin" \
            -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')

          if [ -z "$BOOTLOADER" ]; then
            echo "ERROR: bootloader.bin not found under $TARGET_DIR/build" >&2
            exit 1
          fi
          if [ -z "$PARTITION_TABLE" ]; then
            echo "ERROR: partition-table.bin not found under $TARGET_DIR/build" >&2
            exit 1
          fi

          echo "Bootloader:       $BOOTLOADER"
          echo "Partition table:  $PARTITION_TABLE"

          # Derive flash parameters from the generated sdkconfig so
          # elf2image stays aligned with the build configuration.
          SDKCONFIG=$(find "$TARGET_DIR/build" -name sdkconfig \
            -path "*/esp-idf-sys-*/out/sdkconfig" \
            -printf '%T@ %p\n' | sort -nr | head -n1 | awk '{print $2}')

          FLASH_MODE=$(grep -oP '(?<=CONFIG_ESPTOOLPY_FLASHMODE=").*(?=")' "$SDKCONFIG" 2>/dev/null || echo "dio")
          FLASH_FREQ=$(grep -oP '(?<=CONFIG_ESPTOOLPY_FLASHFREQ=").*(?=")' "$SDKCONFIG" 2>/dev/null || echo "80m")
          FLASH_SIZE=$(grep -oP '(?<=CONFIG_ESPTOOLPY_FLASHSIZE=").*(?=")' "$SDKCONFIG" 2>/dev/null || echo "16MB")
          echo "Flash mode=$FLASH_MODE freq=$FLASH_FREQ size=$FLASH_SIZE"

          # Convert ELF → flat binary.
          esptool.py --chip esp32s3 elf2image \
            --flash_mode  "$FLASH_MODE" \
            --flash_freq  "$FLASH_FREQ" \
            --flash_size  "$FLASH_SIZE" \
            --output "$TARGET_DIR/modem.bin" \
            "$TARGET_DIR/modem"

          # Merge bootloader + partition table + app into a single image.
          # On ESP32-S3 the bootloader loads at flash offset 0x0 (not 0x1000).
          esptool.py --chip esp32s3 merge_bin \
            --output flash_image.bin \
            0x0     "$BOOTLOADER" \
            0x8000  "$PARTITION_TABLE" \
            0x10000 "$TARGET_DIR/modem.bin"

          echo "flash_image.bin created ($(wc -c < flash_image.bin) bytes)"

      # ------------------------------------------------------------------ #
      # Upload firmware artifact
      # ------------------------------------------------------------------ #

      - name: Upload modem firmware
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: modem-firmware
          path: flash_image.bin
          if-no-files-found: error
          retention-days: 7
