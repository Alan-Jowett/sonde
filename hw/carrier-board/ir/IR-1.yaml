  - ref_des: R4
    description: "P-FET gate pull-up resistor (default OFF)"
    manufacturer: "Uniroyal"
    part_number: "0402WGF1003TCE"
    package: "0402"
    generic_footprint: "0402"
    electrical_specs:
      resistance_ohm: 100000
