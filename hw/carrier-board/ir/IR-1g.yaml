  # FB1 + 6×0402 + C2 + C3: 8 × (0.5×1.0) = 4.0
  # C1: 1.25×2.0 = 2.5
  # J1: 6.0×4.3 = 25.8
  # J2: 10.0×7.0 = 70.0 (largest component)
  # J3: 6.0×6.0 = 36.0 (not included — subtract from wrong side)
  # Actually recalculating:
  #   Q1:  3.77
  #   FB1: 0.50
  #   R1-R6: 6 × 0.50 = 3.00
  #   C1:  2.50
  #   C2:  0.50
  #   C3:  0.50
  #   J1:  25.80
  #   J2:  70.00  (THT, right-angle — extends beyond board edge)
  #   J3:  36.00  (THT, right-angle — extends beyond board edge)
  #   J6:  45.19  (2.54 × 17.78)
  #   J7:  45.19
  #   Total = ~232.95 mm²
  #
  # Board area target: 25 × 35 = 875 mm²
  # Body utilization: 232.95 / 875 = ~26.6%
  #
  # Note: J2, J3 right-angle connectors extend beyond board edge,
  # so on-board footprint area is smaller. J6/J7 dominate board area
  # as expected (they define the XIAO socket spacing).

  board_target_area_mm2: 875.0
  body_utilization_pct: 26.6
  feasibility: "PASS — well within limits for 2-layer board"
  notes: >
    Body-only estimate. Courtyard will be larger (typically 1.5-2×
    body area for SMD). THT right-angle connectors (J2, J3) extend
    beyond board edge — their on-board footprint is smaller than body
    dimensions suggest. Definitive check uses IR-1e courtyards in Pass 3.
