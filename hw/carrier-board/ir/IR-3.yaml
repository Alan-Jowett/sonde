schema_version: 1.0.0
project: sonde-carrier
backend: KiCad 8
board:
  shape: rectangle
  width_mm: 25.0
  height_mm: 35.0
  area_mm2: 875.0
  layers: 2
  stackup:
    layer_1: F.Cu (front copper)
    substrate: FR4 1.6mm
    layer_2: B.Cu (back copper)
  copper_weight_oz: 1
  surface_finish: HASL (lead-free)
  mounting_holes: none
  origin: bottom-left corner (0,0)
edges:
  top:
    y: 35.0
    role: USB-C access edge
    description: 'XIAO USB-C port extends beyond or is flush with this edge. No other
      connectors on this edge per REQ-HW-0707.

      '
  bottom:
    y: 0.0
    role: Antenna edge
    description: 'XIAO u.FL antenna connector faces this edge. Clearance zone required
      for antenna cable routing. No connectors per REQ-HW-0707.

      '
  left:
    x: 0.0
    role: Connector edge (J1 Qwiic + J3 Battery)
    connectors:
    - J1
    - J3
  right:
    x: 25.0
    role: Connector edge (J2 1-Wire)
    connectors:
    - J2
